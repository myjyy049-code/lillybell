<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F5A55A">
<title>  LillyBell</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #FFF8F2; color: #222; min-height: 100vh; }

.app-header {
  background: linear-gradient(135deg, #F5A55A 0%, #F5C97A 100%);
  padding: 14px 16px 0; color: #4A2800;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(200,120,0,0.15);
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.header-top h1 { font-size: 20px; font-weight: 600; }
.header-top .subtitle { font-size: 11px; opacity: 0.65; margin-top: 1px; }
.tab-bar { display: flex; gap: 3px; overflow-x: auto; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  padding: 8px 15px; font-size: 13px; font-weight: 500;
  border-radius: 8px 8px 0 0; cursor: pointer; border: none;
  background: rgba(255,255,255,0.32); color: #4A2800;
  white-space: nowrap; transition: background 0.15s;
}
.tab.active { background: #FFF8F2; color: #333; }

.content { padding: 16px; max-width: 800px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }

.sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.stab {
  padding: 5px 14px; font-size: 12px; font-weight: 500;
  border-radius: 20px; cursor: pointer;
  border: 1px solid #ddd; background: #fff; color: #888; transition: all 0.15s;
}
.stab.active { background: #E8934A; color: #fff; border-color: #E8934A; }
.kview { display: none; }
.kview.active { display: block; }

.stats-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.stat { background: #fff; border: 1px solid #EEE0D0; border-radius: 10px; padding: 6px 12px; font-size: 11px; color: #888; }
.stat strong { font-size: 17px; font-weight: 600; color: #333; display: block; }

.kennel-layout { display: grid; grid-template-columns: 1fr 36px 1fr; gap: 6px; align-items: start; }
.aisle {
  background: #F0E8DC; border: 1px solid #DDD0C0; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: #A08060; writing-mode: vertical-rl;
  padding: 10px 0; min-height: 200px;
}
.cage-col { display: flex; flex-direction: column; gap: 5px; }
.row-label { font-size: 9px; color: #AAA; margin-bottom: 2px; padding-left: 2px; }

.cage {
  border: 1px solid #EEE; border-radius: 10px;
  padding: 6px 8px; cursor: pointer; background: #FAFAFA; min-height: 52px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.cage:hover { border-color: #E8934A; box-shadow: 0 0 0 2px rgba(232,147,74,0.15); }
.cage.full { background: #FFF5EC; border-color: #F5B97A; }
.cage.half { background: #FFFBF6; border-color: #F5D0A0; }
.cage.empty { background: #F8F8F8; }
.cage-id { font-size: 9px; color: #BBB; margin-bottom: 3px; }
.cage-dogs { display: flex; flex-direction: column; gap: 2px; }
.dog-tag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 1px 6px; border-radius: 10px; width: fit-content; }
.dog-tag.female { background: #FBEAF0; color: #993556; }
.dog-tag.male { background: #E6F1FB; color: #185FA5; }
.empty-tag { font-size: 10px; color: #CCC; }
.birth-info { margin-top: 4px; padding-top: 4px; border-top: 1px solid #F0E0D0; font-size: 10px; color: #888; line-height: 1.6; }
.birth-info .bdate { color: #C47A3A; font-weight: 500; }

/* 犬リスト */
.dog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 10px; margin-bottom: 16px; }
.dog-card { background: #fff; border: 1px solid #EEE; border-radius: 12px; padding: 12px; cursor: pointer; transition: border-color 0.15s; position: relative; }
.dog-card:hover { border-color: #E8934A; }
.dog-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 8px; }
.dog-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.dog-card .breed { font-size: 11px; color: #999; margin-bottom: 6px; }
.badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
.badge-f { background: #FBEAF0; color: #993556; }
.badge-m { background: #E6F1FB; color: #185FA5; }
.badge-loc { background: #FFF0E0; color: #8B4A00; font-size: 10px; margin-left: 4px; }
.dog-del-btn {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; color: #DDD; font-size: 14px; cursor: pointer; line-height: 1;
}
.dog-del-btn:hover { color: #E24B4A; }

.add-btn {
  width: 100%; padding: 10px; border: 1px dashed #DDD;
  border-radius: 12px; background: transparent; color: #AAA;
  font-size: 13px; cursor: pointer; margin-bottom: 20px; transition: background 0.15s;
}
.add-btn:hover { background: #FFF5EC; border-color: #E8934A; color: #E8934A; }

/* 詳細パネル */
.detail-panel { display: none; background: #fff; border: 1px solid #EEE; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.detail-panel.open { display: block; }
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #F0F0F0; }
.detail-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; }
.detail-header h2 { font-size: 17px; font-weight: 600; }
.detail-header .meta { font-size: 11px; color: #999; margin-top: 2px; }
.record-section { margin-bottom: 14px; }
.record-section h4 { font-size: 11px; font-weight: 600; color: #AAA; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.record-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px; }
.record-row:last-child { border-bottom: none; }
.close-btn { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #CCC; }
.memo-box { width: 100%; min-height: 64px; font-size: 13px; padding: 8px 10px; border: 1px solid #DDD; border-radius: 10px; background: #FAFAFA; color: #333; resize: vertical; font-family: inherit; }
.save-btn { margin-top: 8px; padding: 8px 18px; border-radius: 10px; border: none; background: #E8934A; color: #fff; font-size: 13px; cursor: pointer; font-weight: 500; }
.edit-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.edit-fields input, .edit-fields select {
  padding: 7px 10px; border: 1px solid #DDD; border-radius: 8px;
  font-size: 13px; font-family: inherit; background: #FAFAFA;
}

/* シフト・カレンダー */
.month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.month-nav button { background: #fff; border: 1px solid #EEE; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: #555; }
.month-nav span { font-size: 16px; font-weight: 600; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 16px;
}
.cal-dow {
  text-align: center; font-size: 11px; font-weight: 600;
  padding: 4px 0; color: #999;
}
.cal-dow.sun { color: #E24B4A; }
.cal-dow.sat { color: #185FA5; }
.cal-cell {
  background: #fff; border: 1px solid #EEE; border-radius: 8px;
  padding: 4px; min-height: 64px; cursor: pointer; transition: border-color 0.15s;
}
.cal-cell:hover { border-color: #E8934A; }
.cal-cell.empty-cell { background: transparent; border-color: transparent; cursor: default; }
.cal-cell.today { border-color: #E8934A; }
.cal-date { font-size: 11px; font-weight: 600; margin-bottom: 3px; }
.cal-date.sun { color: #E24B4A; }
.cal-date.sat { color: #185FA5; }
.cal-shifts { display: flex; flex-direction: column; gap: 2px; }
.cal-shift-tag { font-size: 9px; background: #EAF3DE; color: #3B6D11; border-radius: 4px; padding: 1px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* シフト編集モーダル用スタッフ選択 */
.staff-shift-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.staff-shift-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.staff-shift-row label { width: 70px; flex-shrink: 0; font-weight: 500; }
.staff-shift-row input[type=time] {
  flex: 1; padding: 5px 8px; border: 1px solid #DDD; border-radius: 8px;
  font-size: 13px; font-family: inherit; background: #FAFAFA;
}
.staff-shift-row .off-btn {
  padding: 4px 10px; font-size: 11px; border: 1px solid #DDD;
  border-radius: 8px; background: #F5F5F5; cursor: pointer; color: #888;
}
.staff-shift-row .off-btn.active { background: #EEE; color: #E24B4A; border-color: #E24B4A; }

/* 給与 */
.wage-section { margin-bottom: 20px; }
.wage-section h3 { font-size: 13px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px; }
.hourly-box { background: #fff; border: 1px solid #EEE; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
.hourly-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px; }
.hourly-row:last-child { border-bottom: none; }
.hourly-row input { width: 90px; text-align: right; font-size: 13px; padding: 4px 8px; border: 1px solid #DDD; border-radius: 8px; background: #FAFAFA; color: #333; font-family: inherit; }
.wage-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.wage-card { background: #fff; border-radius: 14px; border: 1px solid #EEE; padding: 14px 16px; }
.wage-card .wname { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.wage-card .whours { font-size: 11px; color: #AAA; margin-bottom: 8px; }
.wage-card .wamt { font-size: 24px; font-weight: 700; color: #E8934A; }
.wage-card .wyen { font-size: 14px; }

/* 交配管理 */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.section-title { font-size: 13px; color: #999; font-weight: 500; }
.breed-list { display: flex; flex-direction: column; gap: 10px; }
.breed-card { background: #fff; border: 1px solid #EEE; border-radius: 14px; padding: 14px 16px; position: relative; }
.breed-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.breed-pair { font-size: 15px; font-weight: 600; }
.bstatus { font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
.bstatus.pregnant { background: #E8F5E9; color: #2E7D32; }
.bstatus.planned  { background: #E3F2FD; color: #1565C0; }
.bstatus.done     { background: #F5F5F5; color: #757575; }
.breed-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; color: #999; margin-bottom: 8px; }
.breed-dates span { color: #444; font-weight: 500; }
.birth-result { display: flex; gap: 10px; flex-wrap: wrap; background: #FFF8F0; border-radius: 8px; padding: 8px 10px; font-size: 12px; margin-top: 6px; }
.birth-result .bnum { font-weight: 600; font-size: 14px; }
.birth-result .blabel { color: #999; font-size: 11px; }
.breed-del { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #DDD; font-size: 14px; cursor: pointer; }
.breed-del:hover { color: #E24B4A; }

/* モーダル */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 200; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 20px; width: 300px; max-width: 92vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.modal-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #CCC; }
.modal-dog-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px; }
.modal-dog-row:last-child { border-bottom: none; }
.mremove { font-size: 11px; color: #E24B4A; cursor: pointer; background: none; border: none; padding: 2px 8px; }
.madd-row { display: flex; gap: 8px; margin-top: 12px; }
.madd-row select { flex: 1; font-size: 12px; padding: 6px 8px; border: 1px solid #DDD; border-radius: 8px; background: #FAFAFA; color: #333; }
.madd-row button { padding: 6px 14px; font-size: 12px; font-weight: 500; background: #E8934A; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.mclose-btn { margin-top: 10px; width: 100%; padding: 8px; border: 1px solid #EEE; border-radius: 10px; background: transparent; cursor: pointer; font-size: 13px; color: #999; }
.minput { width: 100%; padding: 7px 10px; border: 1px solid #DDD; border-radius: 8px; font-size: 13px; font-family: inherit; background: #FAFAFA; margin-bottom: 6px; }
.mselect { width: 100%; padding: 7px 10px; border: 1px solid #DDD; border-radius: 8px; font-size: 13px; font-family: inherit; background: #FAFAFA; margin-bottom: 6px; }
.mgrid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; }
.mgrid3 input { padding: 7px 6px; border: 1px solid #DDD; border-radius: 8px; font-size: 12px; font-family: inherit; text-align: center; background: #FAFAFA; }

/* ローディング */
.loading { text-align: center; padding: 40px; color: #BBB; font-size: 14px; }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* ボトムナビ */
.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #EEE; padding: 6px 0 max(6px, env(safe-area-inset-bottom)); z-index: 100; box-shadow: 0 -2px 12px rgba(0,0,0,0.07); }
.bottom-nav-inner { display: flex; justify-content: space-around; }
.bnav-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 12px; background: none; border: none; cursor: pointer; color: #BBB; font-size: 10px; font-weight: 500; font-family: inherit; }
.bnav-btn .bicon { font-size: 20px; line-height: 1; }
.bnav-btn.active { color: #E8934A; }

.paw-divider { text-align: center; color: #F5C97A; font-size: 18px; margin: 16px 0; letter-spacing: 8px; }
.hint { font-size: 11px; color: #BBB; margin-top: 8px; }

@media (max-width: 600px) {
  .tab-bar { display: none; }
  .bottom-nav { display: block; }
  .content { padding: 12px 12px 80px; }
  .app-header { padding: 10px 14px 10px; }
  .app-header .header-top { margin-bottom: 0; }
  .dog-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .kennel-layout { grid-template-columns: 1fr 28px 1fr; gap: 4px; }
  .cage { min-height: 52px; padding: 5px 6px; }
  .cage-id { font-size: 8px; }
  .dog-tag { font-size: 10px; }
  .wage-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
  .cal-grid { gap: 2px; }
  .cal-cell { min-height: 52px; padding: 3px; }
  .cal-shift-tag { font-size: 8px; }
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div>
      <h1>  LillyBell</h1>
      <div class="subtitle">犬舎総合管理システム</div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchMain('dogs',this)" data-tab="dogs">  犬の管理</button>
    <button class="tab" onclick="switchMain('kennel',this)" data-tab="kennel">  犬舎</button>
    <button class="tab" onclick="switchMain('breed',this)" data-tab="breed">  交配</button>
    <button class="tab" onclick="switchMain('shift',this)" data-tab="shift">  シフト</button>
    <button class="tab" onclick="switchMain('wage',this)" data-tab="wage">  給与</button>
  </div>
</div>

<div class="content">

  <!-- 犬の管理 -->
  <div class="page active" id="page-dogs">
    <div class="detail-panel" id="detail-panel">
      <button class="close-btn" onclick="closeDetail()">?</button>
      <div class="detail-header">
        <div class="detail-avatar" id="d-avatar"></div>
        <div>
          <h2 id="d-name"></h2>
          <div class="meta" id="d-meta"></div>
        </div>
      </div>
      <div class="edit-fields" id="edit-fields"></div>
      <div class="record-section" id="birth-history" style="display:none;">
        <h4>出産履歴</h4>
        <div class="record-row"><span>（交配管理タブで確認）</span></div>
      </div>
      <div class="record-section">
        <h4>健康メモ</h4>
        <textarea class="memo-box" id="dog-memo"></textarea>
        <button class="save-btn" onclick="saveDogEdit()">保存</button>
      </div>
    </div>
    <div class="dog-grid" id="dog-grid"><div class="loading">読み込み中...</div></div>
    <button class="add-btn" onclick="openModal('add-dog-overlay')">＋ 犬を追加</button>
  </div>

  <!-- 犬舎 -->
  <div class="page" id="page-kennel">
    <div class="sub-tabs">
      <button class="stab active" onclick="switchKennel('A',this)">犬舎 A</button>
      <button class="stab" onclick="switchKennel('B',this)">犬舎 B</button>
      <button class="stab" onclick="switchKennel('birth',this)">  お産部屋</button>
    </div>
    <div class="kview active" id="kv-A"></div>
    <div class="kview" id="kv-B"></div>
    <div class="kview" id="kv-birth"></div>
  </div>

  <!-- 交配管理 -->
  <div class="page" id="page-breed">
    <div class="section-header">
      <span class="section-title">交配記録</span>
      <button class="save-btn" onclick="openBreedModal()">＋ 追加</button>
    </div>
    <div id="breed-list"><div class="loading">読み込み中...</div></div>
  </div>

  <!-- シフト -->
  <div class="page" id="page-shift">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">?</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">?</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- 給与 -->
  <div class="page" id="page-wage">
    <div class="wage-section">
      <h3>時給設定</h3>
      <div class="hourly-box" id="hourly-list"></div>
    </div>
    <div class="wage-section">
      <h3>今月の給与</h3>
      <div class="wage-cards" id="wage-cards"></div>
    </div>
    <div class="paw-divider">     </div>
    <p class="hint" style="text-align:center;">シフト表の勤務時間 × 時給で自動計算されます</p>
  </div>

</div>

<!-- ボトムナビ -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-btn active" onclick="switchMain('dogs',this)" data-tab="dogs"><span class="bicon"> </span>犬</button>
    <button class="bnav-btn" onclick="switchMain('kennel',this)" data-tab="kennel"><span class="bicon"> </span>犬舎</button>
    <button class="bnav-btn" onclick="switchMain('breed',this)" data-tab="breed"><span class="bicon"> </span>交配</button>
    <button class="bnav-btn" onclick="switchMain('shift',this)" data-tab="shift"><span class="bicon"> </span>シフト</button>
    <button class="bnav-btn" onclick="switchMain('wage',this)" data-tab="wage"><span class="bicon"> </span>給与</button>
  </div>
</nav>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- 犬追加モーダル -->
<div class="overlay" id="add-dog-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('add-dog-overlay')">?</button>
    <h3 id="add-dog-title">犬を追加</h3>
    <input class="minput" id="new-name" placeholder="名前">
    <input class="minput" id="new-breed" placeholder="犬種">
    <select class="mselect" id="new-gender">
      <option value="female">メス</option>
      <option value="male">オス</option>
    </select>
    <input class="minput" id="new-born" placeholder="生年月日（例：2023.04.01）">
    <button class="save-btn" style="width:100%;" onclick="saveDog()">保存する</button>
    <button class="mclose-btn" onclick="closeModal('add-dog-overlay')">キャンセル</button>
  </div>
</div>

<!-- ケージモーダル -->
<div class="overlay" id="cage-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('cage-overlay')">?</button>
    <h3 id="modal-cage-title"></h3>
    <div id="modal-cage-body"></div>
    <div class="madd-row">
      <select id="cage-dog-select"></select>
      <button onclick="assignDog()">割り当て</button>
    </div>
    <button class="mclose-btn" onclick="closeModal('cage-overlay')">閉じる</button>
  </div>
</div>

<!-- お産部屋出産情報モーダル -->
<div class="overlay" id="birth-info-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('birth-info-overlay')">?</button>
    <h3 id="bi-title"></h3>
    <input class="minput" id="bi-due" type="date" placeholder="出産予定日">

<script>
// ================= Supabase設定 =================
const SUPA_URL = 'https://akrtgasyenuptcoezwhs.supabase.co';
const SUPA_KEY = 'sb_publishable_VbnT0A4f8QdDLkBXYC7sOw_k2cUVXTh';

async function supaFetch(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : '',
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ================= 状態 =================
const EMOJIS = [' ',' ',' ',' ',' ? ',' '];
const BG_COLORS = ['#FFF0F5','#FFF8E7','#F0F8FF','#FFF3E4','#F5FFF0','#F8F0FF'];

let dogs = [];
let cageAssignments = []; // [{kennel, cage_key, dog_id}]

let currentMonth = new Date().getMonth();

// ================= トースト =================

async function loadDogs() {
  dogs = await supaFetch('dogs?order=id.asc');

}

function dogLocLabel(loc) {
  if (loc==='birth') return 'お産部屋';

}

function closeDetail() {

  const rows = await supaFetch('birth_info?select=*');

}

function getCageDogs(kennel, key) {
  return cageAssignments
    .filter(a => a.kennel===kennel && a.cage_key===key)
    .map(a => dogs.find(d=>d.id===a.dog_id))
    .filter(Boolean);
}

function cageHTML(kennel, key, label, max) {
  const cDogs = getCageDogs(kennel, key);
  const cls = cDogs.length>=max ? 'full' : cDogs.length>0 ? 'half' : 'empty';
  const tagsHTML = cDogs.length===0
    ? '<span class="empty-tag">空き</span>'
    : cDogs.map(d=>`<span class="dog-tag ${d.gender}">${d.emoji||' '} ${d.name}</span>`).join('');

  let birthHTML = '';
  if (kennel==='birth' && cDogs.length>0) {
    const info = birthInfoMap[key];
    const dName = cDogs[0].name;
    if (info && (info.due_date||info.birth_date||info.male_count)) {
      birthHTML = `<div class="birth-info">
        ${info.due_date?`<div>予定日: <span class="bdate">${info.due_date}</span></div>`:''}
        ${info.birth_date?`<div>出産日: <span class="bdate">${info.birth_date}</span></div>`:''}
        ${info.male_count||info.female_count?`<div>♂${info.male_count||0} ♀${info.female_count||0}${info.dead_count>0?` 死産${info.dead_count}`:''}</div>`:''}
      </div>
      <button onclick="event.stopPropagation();openBirthInfoModal('${key}','${dName}')" style="margin-top:4px;font-size:10px;color:#E8934A;background:none;border:1px solid #F5C97A;border-radius:6px;padding:2px 8px;cursor:pointer;width:100%;">出産情報を編集</button>`;
    } else {
      birthHTML = `<button onclick="event.stopPropagation();openBirthInfoModal('${key}','${dName}')" style="margin-top:4px;font-size:10px;color:#AAA;background:none;border:1px dashed #DDD;border-radius:6px;padding:2px 8px;cursor:pointer;width:100%;">  出産情報を入力</button>`;
    }
  }
  return `<div class="cage ${cls}" onclick="openCageModal('${kennel}','${key}',${max})">
    <div class="cage-id">${label}</div>
    <div class="cage-dogs">${tagsHTML}</div>
    ${birthHTML}
  </div>`;
}

function renderKennel(kennel) {
  const el = document.getElementById('kv-'+kennel);
  const isBirth = kennel==='birth';
  const rows = 10;
  const max = isBirth ? 1 : 2;

  // 統計
  let used=0, total=0, count=0;
  const keys = isBirth
    ? Array.from({length:rows},(_,i)=>['L','R'].map(s=>`${s}${i+1}`)).flat()
    : Array.from({length:rows},(_,i)=>['L','R'].map(s=>['上','下'].map(lv=>`${s}${i+1}${lv}`))).flat(2);
  keys.forEach(k => {
    total++;
    const n = getCageDogs(kennel,k).length;
    if (n>0) { used++; count+=n; }
  });
  const capacity = isBirth ? total : total*2;

  // 下が1列目・上が10列目（逆順）
  let leftHTML='', rightHTML='';
  for (let r=rows; r>=1; r--) {
    if (isBirth) {
      leftHTML  += cageHTML(kennel, `L${r}`, `左 ${r}番`, max);
      leftHTML  += '<div style="height:5px;"></div>';
      rightHTML += cageHTML(kennel, `R${r}`, `右 ${r}番`, max);
      rightHTML += '<div style="height:5px;"></div>';
    } else {
      leftHTML  += `<div class="row-label">${r}列</div>`;
      leftHTML  += cageHTML(kennel, `L${r}上`, `左${r} 上段`, max);
      leftHTML  += cageHTML(kennel, `L${r}下`, `左${r} 下段`, max);
      leftHTML  += '<div style="height:5px;"></div>';
      rightHTML += `<div class="row-label">${r}列</div>`;
      rightHTML += cageHTML(kennel, `R${r}上`, `右${r} 上段`, max);
      rightHTML += cageHTML(kennel, `R${r}下`, `右${r} 下段`, max);
      rightHTML += '<div style="height:5px;"></div>';
    }
  }

  el.innerHTML = `
    <div class="stats-bar">
      <div class="stat"><strong>${count}</strong>頭在室</div>
      <div class="stat"><strong>${used}/${total}</strong>ケージ使用中</div>
      <div class="stat"><strong>${capacity-count}</strong>頭収容可能</div>
    </div>
    <div class="kennel-layout">
      <div class="cage-col">${leftHTML}</div>
      <div class="aisle">通　路</div>
      <div class="cage-col">${rightHTML}</div>
    </div>
  `;
}

function openCageModal(kennel, key, max) {
  currentKennel=kennel; currentCageKey=key; currentCageMax=max;
  const cDogs = getCageDogs(kennel, key);
  const isFull = cDogs.length>=max;
  document.getElementById('modal-cage-title').textContent = `ケージ ${key}`;
  let body = cDogs.length===0
    ? '<p style="font-size:13px;color:#BBB;padding:8px 0;">空きケージです</p>'
    : cDogs.map((d,i)=>`<div class="modal-dog-row">
        <span class="dog-tag ${d.gender}" style="font-size:13px;">${d.emoji||' '} ${d.name}</span>
        <button class="mremove" onclick="removeDogFromCage(${d.id})">移動・解除</button>
      </div>`).join('');
  document.getElementById('modal-cage-body').innerHTML = body;
  const assignedIds = cageAssignments.map(a=>a.dog_id);
  const sel = document.getElementById('cage-dog-select');
  const available = dogs.filter(d=>!cDogs.find(cd=>cd.id===d.id));
  sel.disabled = isFull;
  sel.innerHTML = isFull ? '<option>満員です</option>'
    : available.length===0 ? '<option>割り当て可能な犬がいません</option>'
    : available.map(d=>`<option value="${d.id}">${d.emoji||' '} ${d.name}（${d.gender==='female'?'メス':'オス'}）</option>`).join('');
  openModal('cage-overlay');
}

async function removeDogFromCage(dogId) {
  await supaFetch(`cage_assignments?kennel=eq.${currentKennel}&cage_key=eq.${currentCageKey}&dog_id=eq.${dogId}`, 'DELETE');
  // locationをnullに
  await supaFetch(`dogs?id=eq.${dogId}`, 'PATCH', {location: null});
  showToast('解除しました');
  await loadCageAssignments();
  await loadDogs();
  renderKennel(currentKennel);
  openCageModal(currentKennel, currentCageKey, currentCageMax);
}

async function assignDog() {
  const sel = document.getElementById('cage-dog-select');
  const dogId = parseInt(sel.value);
  if (!dogId||isNaN(dogId)) return;
  const cDogs = getCageDogs(currentKennel, currentCageKey);
  if (cDogs.length>=currentCageMax) return;

  // お産部屋に移動 → 他の犬舎から削除
  if (currentKennel==='birth') {
    await supaFetch(`cage_assignments?dog_id=eq.${dogId}&kennel=in.(A,B)`, 'DELETE');
  } else {
    await supaFetch(`cage_assignments?dog_id=eq.${dogId}&kennel=eq.birth`, 'DELETE');
  }
  // 既存の同じ犬の割り当て削除（別ケージから移動）
  await supaFetch(`cage_assignments?dog_id=eq.${dogId}`, 'DELETE');

  await supaFetch('cage_assignments', 'POST', {kennel: currentKennel, cage_key: currentCageKey, dog_id: dogId});
  await supaFetch(`dogs?id=eq.${dogId}`, 'PATCH', {location: currentKennel});
  showToast('割り当てました');
  await loadCageAssignments();
  await loadDogs();
  renderKennel(currentKennel);
  openCageModal(currentKennel, currentCageKey, currentCageMax);
}

async function saveBirthInfo() {
  const data = {
    cage_key:      currentBirthCageKey,
    due_date:      document.getElementById('bi-due').value   || null,
    birth_date:    document.getElementById('bi-birth').value || null,

async function loadShifts() {
  const y = currentYear, m = currentMonth+1;
  const from = `${y}-${String(m).padStart(2,'0')}-01`;
  const lastDay = new Date(y,m,0).getDate();
  const to   = `${y}-${String(m).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const rows = await supaFetch(`shifts?work_date=gte.${from}&work_date=lte.${to}&select=*`);
  shiftsMap = {};
  rows.forEach(r => { shiftsMap[`${r.staff_id}_${r.work_date}`] = r; });
}

async function renderShiftCal() {
  await loadShifts();
  document.getElementById('month-label').textContent = `${currentYear}年${currentMonth+1}月`;
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const firstDow = new Date(currentYear, currentMonth, 1).getDay();
  const DOWS = ['日','月','火','水','木','金','土'];
  const today = new Date();

  let html = DOWS.map((d,i)=>`<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');

  // 空白セル
  for (let i=0;i<firstDow;i++) html += '<div class="cal-cell empty-cell"></div>';

  for (let day=1; day<=daysInMonth; day++) {
    const dow = new Date(currentYear, currentMonth, day).getDay();
    const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===day;
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dateCls = dow===0?'sun':dow===6?'sat':'';

    let shiftsHTML = '';
    staffList.forEach(s => {
      const sh = shiftsMap[`${s.id}_${dateStr}`];
      if (sh && sh.start_time) {
        const name = s.name.split(' ')[1] || s.name;
        shiftsHTML += `<div class="cal-shift-tag">${name} ${sh.start_time.slice(0,5)}-${sh.end_time.slice(0,5)}</div>`;
      }
    });

    html += `<div class="cal-cell ${isToday?'today':''}" onclick="openShiftModal('${dateStr}', ${day})">
      <div class="cal-date ${dateCls}">${day}</div>
      <div class="cal-shifts">${shiftsHTML}</div>
    </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function openShiftModal(dateStr, day) {
  editingShiftDate = dateStr;
  const dow = new Date(currentYear, currentMonth, day).getDay();
  const DOWS = ['日','月','火','水','木','金','土'];
  document.getElementById('shift-modal-title').textContent = `${currentMonth+1}月${day}日（${DOWS[dow]}）のシフト`;

  let html = '';
  staffList.forEach(s => {
    const sh = shiftsMap[`${s.id}_${dateStr}`];
    const start = sh?.start_time?.slice(0,5) || '';
    const end   = sh?.end_time?.slice(0,5)   || '';
    const name  = s.name.split(' ')[1] || s.name;
    html += `<div class="staff-shift-row">
      <label>${name}</label>
      <input type="time" id="shift-start-${s.id}" value="${start}" placeholder="開始">
      <span style="font-size:12px;color:#AAA;">?</span>
      <input type="time" id="shift-end-${s.id}" value="${end}" placeholder="終了">
    </div>`;
  });
  document.getElementById('staff-shift-list').innerHTML = html;
  openModal('shift-overlay');
}

async function saveShifts() {
  const promises = staffList.map(async s => {
    const start = document.getElementById(`shift-start-${s.id}`).value;
    const end   = document.getElementById(`shift-end-${s.id}`).value;
    const key   = `${s.id}_${editingShiftDate}`;
    const existing = shiftsMap[key];
    if (start && end) {
      const data = { staff_id: s.id, work_date: editingShiftDate, start_time: start, end_time: end };
      if (existing) {
        await supaFetch(`shifts?id=eq.${existing.id}`, 'PATCH', data);
      } else {
        await supaFetch('shifts', 'POST', data);
      }
    } else if (existing) {
      await supaFetch(`shifts?id=eq.${existing.id}`, 'DELETE');
    }
  });
  await Promise.all(promises);
  showToast('保存しました');
  closeModal('shift-overlay');
  await renderShiftCal();
}

async function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth>11) { currentMonth=0; currentYear++; }
  if (currentMonth<0)  { currentMonth=11; currentYear--; }
  await renderShiftCal();
  renderWage();
}

// ================= 給与 =================
function renderWage() {
  document.getElementById('hourly-list').innerHTML = staffList.map((s,i) =>
    `<div class="hourly-row">
      <span>${s.name}</span>
      <div style="display:flex;align-items:center;gap:4px;">
        <input type="number" value="${s.hourly_wage}" onchange="updateWage(${s.id},this.value)" />
        <span style="font-size:12px;color:#AAA;">円/時</span>
      </div>
    </div>`
  ).join('');
  renderWageCards();
}

async function updateWage(staffId, val) {
  const wage = parseInt(val)||0;
  await supaFetch(`staff?id=eq.${staffId}`, 'PATCH', {hourly_wage: wage});
  const s = staffList.find(x=>x.id===staffId);
  if (s) s.hourly_wage = wage;
  renderWageCards();
}

function renderWageCards() {
  document.getElementById('wage-cards').innerHTML = staffList.map(s => {
    let totalH = 0;
    let workDays = 0;
    Object.keys(shiftsMap).forEach(k => {
      if (k.startsWith(`${s.id}_`)) {
        const sh = shiftsMap[k];
        if (sh.start_time && sh.end_time) {
          const [sh1,sm1] = sh.start_time.split(':').map(Number);
          const [sh2,sm2] = sh.end_time.split(':').map(Number);
          totalH += (sh2*60+sm2 - sh1*60-sm1) / 60;
          workDays++;
        }
      }
    });
    const total = Math.round(totalH * s.hourly_wage);
    return `<div class="wage-card">
      <div class="wname">${s.name}</div>
      <div class="whours">${workDays}日 / ${totalH.toFixed(1)}h</div>
      <div class="wamt"><span class="wyen">\</span>${total.toLocaleString()}</div>
    </div>`;
  }).join('');
}

// ================= タブ切替 =================
function switchMain(tab, el) {
  document.querySelectorAll('.tab, .bnav-btn').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`.tab[data-tab="${tab}"], .bnav-btn[data-tab="${tab}"]`).forEach(t=>t.classList.add('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if (tab==='shift') renderShiftCal();
  if (tab==='wage')  { loadShifts().then(()=>renderWage()); }
  if (tab==='breed') renderBreed();
  if (tab==='kennel') renderKennel(currentKennel);
}

// ================= 初期化 =================
async function init() {
  try {
    await Promise.all([loadDogs(), loadStaff(), loadCageAssignments(), loadBirthInfo(), loadBreedRecords()]);
    renderKennel('A');
    renderWage();
  } catch(e) {
    console.error(e);
    showToast('データ読み込みエラー');
  }
}

init();
</script>
