<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F5A55A">
<title>🌸 LillyBell</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #FFF8F2; color: #222; min-height: 100vh; }

/* ヘッダー */
.app-header {
  background: linear-gradient(135deg, #F5A55A 0%, #F5C97A 100%);
  padding: 14px 16px 0;
  color: #4A2800;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(200,120,0,0.15);
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.header-top h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.header-top .subtitle { font-size: 11px; opacity: 0.65; margin-top: 1px; }
.tab-bar { display: flex; gap: 3px; overflow-x: auto; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  padding: 8px 15px; font-size: 13px; font-weight: 500;
  border-radius: 8px 8px 0 0; cursor: pointer; border: none;
  background: rgba(255,255,255,0.32); color: #4A2800;
  white-space: nowrap; transition: background 0.15s;
}
.tab.active { background: #FFF8F2; color: #333; }

/* コンテンツ */
.content { padding: 16px; max-width: 800px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }

/* サブタブ */
.sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.stab {
  padding: 5px 14px; font-size: 12px; font-weight: 500;
  border-radius: 20px; cursor: pointer;
  border: 1px solid #ddd; background: #fff; color: #888;
  transition: all 0.15s;
}
.stab.active { background: #E8934A; color: #fff; border-color: #E8934A; }

.kview { display: none; }
.kview.active { display: block; }

/* 統計バー */
.stats-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.stat {
  background: #fff; border: 1px solid #EEE0D0;
  border-radius: 10px; padding: 6px 12px;
  font-size: 11px; color: #888;
}
.stat strong { font-size: 17px; font-weight: 600; color: #333; display: block; }

/* 犬舎レイアウト */
.kennel-layout {
  display: grid;
  grid-template-columns: 1fr 36px 1fr;
  gap: 6px; align-items: start;
}
.aisle {
  background: #F0E8DC; border: 1px solid #DDD0C0;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: #A08060;
  writing-mode: vertical-rl;
  padding: 10px 0; min-height: 200px;
}
.cage-col { display: flex; flex-direction: column; gap: 5px; }
.row-label { font-size: 9px; color: #AAA; margin-bottom: 2px; padding-left: 2px; }

.cage {
  border: 1px solid #EEE; border-radius: 10px;
  padding: 6px 8px; cursor: pointer;
  background: #FAFAFA; min-height: 46px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.cage:hover { border-color: #E8934A; box-shadow: 0 0 0 2px rgba(232,147,74,0.15); }
.cage.full { background: #FFF5EC; border-color: #F5B97A; }
.cage.half { background: #FFFBF6; border-color: #F5D0A0; }
.cage.empty { background: #F8F8F8; }

.cage-id { font-size: 9px; color: #BBB; margin-bottom: 3px; }
.cage-dogs { display: flex; flex-direction: column; gap: 2px; }
.dog-tag {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 500;
  padding: 1px 6px; border-radius: 10px; width: fit-content;
}
.dog-tag.female { background: #FBEAF0; color: #993556; }
.dog-tag.male { background: #E6F1FB; color: #185FA5; }
.dog-tag.birth { background: #FFF0E0; color: #8B4A00; }
.empty-tag { font-size: 10px; color: #CCC; }

/* 犬リスト */
.dog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 10px; margin-bottom: 16px; }
.dog-card {
  background: #fff; border: 1px solid #EEE; border-radius: 12px;
  padding: 12px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
}
.dog-card:hover { border-color: #E8934A; box-shadow: 0 2px 8px rgba(232,147,74,0.12); }
.dog-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 8px; }
.dog-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.dog-card .breed { font-size: 11px; color: #999; margin-bottom: 6px; }
.badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
.badge-f { background: #FBEAF0; color: #993556; }
.badge-m { background: #E6F1FB; color: #185FA5; }
.badge-loc { background: #FFF0E0; color: #8B4A00; font-size: 10px; margin-left: 4px; }

.add-btn {
  width: 100%; padding: 10px; border: 1px dashed #DDD;
  border-radius: 12px; background: transparent; color: #AAA;
  font-size: 13px; cursor: pointer; margin-bottom: 20px;
  transition: background 0.15s;
}
.add-btn:hover { background: #FFF5EC; border-color: #E8934A; color: #E8934A; }

/* 犬詳細パネル */
.detail-panel {
  display: none; background: #fff; border: 1px solid #EEE;
  border-radius: 14px; padding: 16px; margin-bottom: 16px;
}
.detail-panel.open { display: block; }
.detail-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #F0F0F0;
}
.detail-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; }
.detail-header h2 { font-size: 17px; font-weight: 600; }
.detail-header .meta { font-size: 11px; color: #999; margin-top: 2px; }
.record-section { margin-bottom: 14px; }
.record-section h4 { font-size: 11px; font-weight: 600; color: #AAA; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.record-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px;
}
.record-row:last-child { border-bottom: none; }
.record-date { color: #BBB; font-size: 11px; }
.close-btn { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #CCC; line-height: 1; }
.memo-box {
  width: 100%; min-height: 64px; font-size: 13px; padding: 8px 10px;
  border: 1px solid #DDD; border-radius: 10px; background: #FAFAFA;
  color: #333; resize: vertical; font-family: inherit;
}
.save-btn {
  margin-top: 8px; padding: 6px 18px; border-radius: 10px;
  border: none; background: #E8934A; color: #fff; font-size: 13px;
  cursor: pointer; font-weight: 500;
}
.save-btn:hover { background: #D4803A; }

/* シフト表 */
.month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.month-nav button {
  background: #fff; border: 1px solid #EEE; border-radius: 8px;
  padding: 5px 12px; cursor: pointer; font-size: 13px; color: #555;
}
.month-nav span { font-size: 16px; font-weight: 600; }
.shift-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #EEE; }
.shift-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 520px; }
.shift-table th {
  padding: 7px 6px; text-align: center; font-weight: 500; color: #999;
  border-bottom: 1px solid #EEE; background: #FAF8F5; font-size: 11px;
}
.shift-table th.name-col { text-align: left; padding-left: 12px; }
.shift-table td { padding: 6px; text-align: center; border-bottom: 1px solid #F5F5F5; }
.shift-table td.name-col { text-align: left; font-weight: 500; font-size: 13px; padding-left: 12px; white-space: nowrap; }
.shift-table tr:last-child td { border-bottom: none; }
.scell {
  background: #EAF3DE; color: #3B6D11; border-radius: 5px;
  padding: 2px 4px; font-size: 10px; font-weight: 500; white-space: nowrap;
  cursor: pointer; display: inline-block;
}
.scell.off { background: transparent; color: #CCC; font-size: 10px; }
.scell.we { color: #E24B4A; }
.sun { color: #E24B4A !important; }
.sat { color: #185FA5 !important; }

/* 給与 */
.wage-section { margin-bottom: 20px; }
.wage-section h3 { font-size: 13px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px; }
.hourly-box { background: #fff; border: 1px solid #EEE; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
.hourly-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px;
}
.hourly-row:last-child { border-bottom: none; }
.hourly-row input {
  width: 90px; text-align: right; font-size: 13px;
  padding: 4px 8px; border: 1px solid #DDD; border-radius: 8px;
  background: #FAFAFA; color: #333; font-family: inherit;
}
.wage-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.wage-card {
  background: #fff; border-radius: 14px; border: 1px solid #EEE; padding: 14px 16px;
}
.wage-card .wname { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.wage-card .whours { font-size: 11px; color: #AAA; margin-bottom: 8px; }
.wage-card .wamt { font-size: 24px; font-weight: 700; color: #E8934A; }
.wage-card .wyen { font-size: 14px; }

/* モーダル */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
  z-index: 200;
}
.overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 16px;
  padding: 20px; width: 300px; max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.modal-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #CCC; }
.modal-dog-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px;
}
.modal-dog-row:last-child { border-bottom: none; }
.mremove { font-size: 11px; color: #E24B4A; cursor: pointer; background: none; border: none; padding: 2px 8px; }
.madd-row { display: flex; gap: 8px; margin-top: 12px; }
.madd-row select {
  flex: 1; font-size: 12px; padding: 6px 8px;
  border: 1px solid #DDD; border-radius: 8px; background: #FAFAFA; color: #333;
}
.madd-row button {
  padding: 6px 14px; font-size: 12px; font-weight: 500;
  background: #E8934A; color: #fff; border: none; border-radius: 8px; cursor: pointer;
}
.mclose-btn {
  margin-top: 10px; width: 100%; padding: 8px;
  border: 1px solid #EEE; border-radius: 10px;
  background: transparent; cursor: pointer; font-size: 13px; color: #999;
}

/* 交配管理 */
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.section-title { font-size:13px; color:#999; font-weight:500; }
.breed-list { display:flex; flex-direction:column; gap:10px; }
.breed-card {
  background:#fff; border:1px solid #EEE; border-radius:14px; padding:14px 16px;
}
.breed-card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.breed-pair { font-size:15px; font-weight:600; }
.bstatus {
  font-size:11px; padding:2px 9px; border-radius:10px; font-weight:500;
}
.bstatus.pregnant { background:#E8F5E9; color:#2E7D32; }
.bstatus.planned  { background:#E3F2FD; color:#1565C0; }
.bstatus.done     { background:#F5F5F5; color:#757575; }
.breed-dates {
  display:grid; grid-template-columns:1fr 1fr; gap:6px;
  font-size:12px; color:#999; margin-bottom:8px;
}
.breed-dates span { color:#444; font-weight:500; }
.birth-result {
  display:flex; gap:10px; flex-wrap:wrap;
  background:#FFF8F0; border-radius:8px; padding:8px 10px;
  font-size:12px; margin-top:6px;
}
.birth-result .bnum { font-weight:600; font-size:14px; }
.birth-result .blabel { color:#999; font-size:11px; }
.breed-del { float:right; background:none; border:none; color:#DDD; font-size:14px; cursor:pointer; }
.breed-del:hover { color:#E24B4A; }

/* お産部屋ケージ拡張 */
.birth-info {
  margin-top:4px; padding-top:4px; border-top:1px solid #F0E0D0;
  font-size:10px; color:#888; line-height:1.6;
}
.birth-info .bdate { color:#C47A3A; font-weight:500; }

/* ユーティリティ */
.paw-divider { text-align: center; color: #F5C97A; font-size: 18px; margin: 16px 0; letter-spacing: 8px; }
.hint { font-size: 11px; color: #BBB; margin-top: 8px; }

/* ボトムナビ（スマホ用） */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid #EEE;
  padding: 6px 0 max(6px, env(safe-area-inset-bottom));
  z-index: 100;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
}
.bottom-nav-inner { display: flex; justify-content: space-around; }
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 16px; background: none; border: none; cursor: pointer;
  color: #BBB; font-size: 10px; font-weight: 500; font-family: inherit;
  transition: color 0.15s;
}
.bnav-btn .bicon { font-size: 22px; line-height: 1; }
.bnav-btn.active { color: #E8934A; }

/* スマホ時はタブバー非表示・ボトムナビ表示・コンテンツ下余白 */
@media (max-width: 600px) {
  .tab-bar { display: none; }
  .bottom-nav { display: block; }
  .content { padding: 12px 12px 80px; }
  .app-header { padding: 10px 14px 10px; }
  .app-header .header-top { margin-bottom: 0; }
  .dog-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .detail-header { flex-wrap: wrap; }
  .kennel-layout { grid-template-columns: 1fr 28px 1fr; gap: 4px; }
  .cage { min-height: 42px; padding: 5px 6px; }
  .cage-id { font-size: 8px; }
  .dog-tag { font-size: 10px; padding: 1px 5px; }
  .aisle { font-size: 9px; }
  .stats-bar { gap: 6px; }
  .stat { padding: 5px 10px; }
  .stat strong { font-size: 15px; }
  .wage-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
  .wage-card { padding: 12px; }
  .wage-card .wamt { font-size: 20px; }
  .modal { width: 92vw; padding: 16px; }
  .sub-tabs { gap: 6px; }
  .stab { padding: 5px 12px; font-size: 12px; }
  .month-nav span { font-size: 15px; }
  .record-row { font-size: 12px; flex-wrap: wrap; gap: 4px; }
  .hourly-row input { width: 80px; }
  .madd-row select { font-size: 12px; }
  /* タッチターゲット拡大 */
  .cage { min-height: 52px; }
  .save-btn { padding: 10px 20px; font-size: 14px; }
  .add-btn { padding: 14px; font-size: 14px; }
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div>
      <h1>🌸 LillyBell</h1>
      <div class="subtitle">犬舎総合管理システム</div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchMain('dogs',this)" data-tab="dogs">🐶 犬の管理</button>
    <button class="tab" onclick="switchMain('kennel',this)" data-tab="kennel">🏠 犬舎</button>
    <button class="tab" onclick="switchMain('breed',this)" data-tab="breed">💕 交配</button>
    <button class="tab" onclick="switchMain('shift',this)" data-tab="shift">📅 シフト</button>
    <button class="tab" onclick="switchMain('wage',this)" data-tab="wage">💴 給与</button>
  </div>
</div>

<div class="content">

  <!-- 犬の管理 -->
  <div class="page active" id="page-dogs">
    <div class="detail-panel" id="detail-panel">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div class="detail-header">
        <div class="detail-avatar" id="d-avatar"></div>
        <div>
          <h2 id="d-name"></h2>
          <div class="meta" id="d-meta"></div>
        </div>
      </div>
      <div class="record-section">
        <h4>ワクチン記録</h4>
        <div class="record-row">
          <span>混合ワクチン（9種）</span>
          <span class="record-date">2025.03.10</span>
          <span class="badge" style="background:#EAF3DE;color:#3B6D11;">接種済</span>
        </div>
        <div class="record-row">
          <span>狂犬病</span>
          <span class="record-date">2025.04.15</span>
          <span class="badge" style="background:#EAF3DE;color:#3B6D11;">接種済</span>
        </div>
        <div class="record-row">
          <span>次回混合ワクチン</span>
          <span class="record-date">2026.03.予定</span>
          <span class="badge" style="background:#FAEEDA;color:#854F0B;">予定</span>
        </div>
      </div>
      <div class="record-section" id="birth-history" style="display:none;">
        <h4>出産履歴</h4>
        <div class="record-row"><span>第1回</span><span class="record-date">2024.06.20</span><span>3頭</span></div>
        <div class="record-row"><span>第2回</span><span class="record-date">2025.02.14</span><span>2頭</span></div>
      </div>
      <div class="record-section">
        <h4>健康メモ</h4>
        <textarea class="memo-box" id="dog-memo"></textarea>
        <button class="save-btn" onclick="saveMemo()">保存</button>
      </div>
    </div>

    <div class="dog-grid" id="dog-grid"></div>
    <button class="add-btn" onclick="showAddDogModal()">＋ 犬を追加</button>
  </div>

  <!-- 犬舎 -->
  <div class="page" id="page-kennel">
    <div class="sub-tabs">
      <button class="stab active" onclick="switchKennel('A',this)">犬舎 A</button>
      <button class="stab" onclick="switchKennel('B',this)">犬舎 B</button>
      <button class="stab" onclick="switchKennel('birth',this)">🍼 お産部屋</button>
    </div>
    <div class="kview active" id="kv-A"></div>
    <div class="kview" id="kv-B"></div>
    <div class="kview" id="kv-birth"></div>
  </div>

  <!-- 交配管理 -->
  <div class="page" id="page-breed">
    <div class="section-header">
      <span class="section-title">交配記録</span>
      <button class="add-btn" onclick="showBreedModal()">＋ 追加</button>
    </div>
    <div id="breed-list"></div>
  </div>

  <!-- シフト表 -->
  <div class="page" id="page-shift">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="shift-wrap">
      <table class="shift-table" id="shift-table"></table>
    </div>
    <p class="hint">※ セルをタップで勤務時間を編集できます（本実装時）</p>
  </div>

  <!-- 給与 -->
  <div class="page" id="page-wage">
    <div class="wage-section">
      <h3>時給設定</h3>
      <div class="hourly-box" id="hourly-list"></div>
    </div>
    <div class="wage-section">
      <h3>今月の給与</h3>
      <div class="wage-cards" id="wage-cards"></div>
    </div>
    <div class="paw-divider">🐾 🐾 🐾</div>
    <p class="hint" style="text-align:center;">シフト表の勤務時間 × 時給で自動計算されます</p>
  </div>

</div><!-- /content -->

<!-- ボトムナビ（スマホ用） -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-btn active" onclick="switchMain('dogs',this)" data-tab="dogs">
      <span class="bicon">🐶</span>犬
    </button>
    <button class="bnav-btn" onclick="switchMain('kennel',this)" data-tab="kennel">
      <span class="bicon">🏠</span>犬舎
    </button>
    <button class="bnav-btn" onclick="switchMain('breed',this)" data-tab="breed">
      <span class="bicon">💕</span>交配
    </button>
    <button class="bnav-btn" onclick="switchMain('shift',this)" data-tab="shift">
      <span class="bicon">📅</span>シフト
    </button>
    <button class="bnav-btn" onclick="switchMain('wage',this)" data-tab="wage">
      <span class="bicon">💴</span>給与
    </button>
  </div>
</nav>

<!-- 交配追加モーダル -->
<div class="overlay" id="breed-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('breed-overlay')">✕</button>
    <h3>交配記録を追加</h3>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
      <select id="b-female" style="padding:7px 10px;border:1px solid #DDD;border-radius:8px;font-size:13px;font-family:inherit;background:#FAFAFA;"></select>
      <select id="b-male" style="padding:7px 10px;border:1px solid #DDD;border-radius:8px;font-size:13px;font-family:inherit;background:#FAFAFA;"></select>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">

<div class="overlay" id="cage-overlay">

<!-- 犬追加モーダル -->
<div class="overlay" id="add-dog-overlay">
  <div class="modal">

      <input id="new-name" placeholder="名前" style="padding:7px 10px;border:1px solid #DDD;border-radius:8px;font-size:13px;font-family:inherit;">
      <input id="new-breed" placeholder="犬種" style="padding:7px 10px;border:1px solid #DDD;border-radius:8px;font-size:13px;font-family:inherit;">
      <select id="new-gender" style="padding:7px 10px;border:1px solid #DDD;border-radius:8px;font-size:13px;font-family:inherit;background:#FAFAFA;">

        <option value="male">オス</option>
      </select>
      <input id="new-born" placeholder="生年月日（例：2023.04.01）" style="padding:7px 10px;border:1px solid #DDD;border-radius:8px;font-size:13px;font-family:inherit;">
    </div>

    <button class="mclose-btn" onclick="closeModal('add-dog-overlay')">キャンセル</button>
  </div>
</div>

<script>
// ================= データ =================
const EMOJIS = ['🐩','🐕','🐶','🦮','🐕‍🦺','🐾'];
const BG_COLORS = ['#FFF0F5','#FFF8E7','#F0F8FF','#FFF3E4','#F5FFF0','#F8F0FF'];

let dogs = [
  {id:1, name:'ももこ', breed:'トイプードル', gender:'female', born:'2022.04.10', emoji:'🐩', bg:'#FFF0F5', location:'A', memo:'2025.07.01 食欲良好、体重3.2kg。'},
  {id:2, name:'くるみ', breed:'チワワ', gender:'female', born:'2021.08.22', emoji:'🐕', bg:'#FFF8E7', location:'A', memo:''},
  {id:3, name:'そら', breed:'マルチーズ', gender:'male', born:'2023.01.15', emoji:'🐶', bg:'#F0F8FF', location:'B', memo:''},
  {id:4, name:'こてつ', breed:'ポメラニアン', gender:'male', born:'2022.11.03', emoji:'🦮', bg:'#FFF3E4', location:'B', memo:''},
  {id:5, name:'さくら', breed:'シーズー', gender:'female', born:'2020.05.18', emoji:'🐩', bg:'#F5FFF0', location:'birth', memo:''},
  {id:6, name:'ひな', breed:'トイプードル', gender:'female', born:'2023.03.10', emoji:'🐾', bg:'#F8F0FF', location:'A', memo:''},
  {id:7, name:'ゆず', breed:'チワワ', gender:'female', born:'2022.07.22', emoji:'🐕', bg:'#FFF0F5', location:'B', memo:''},
];
let nextDogId = 8;

const kennelData = { A: {}, B: {}, birth: {} };
['A','B'].forEach(k => {
  for (let r=1;r<=10;r++) ['L','R'].forEach(s => ['上','下'].forEach(lv => { kennelData[k][`${s}${r}${lv}`] = []; }));
});
for (let r=1;r<=10;r++) ['L','R'].forEach(s => { kennelData.birth[`${s}${r}`] = []; });

kennelData.A['L1上'] = [1]; kennelData.A['L1下'] = [2,6];
kennelData.B['R1上'] = [3]; kennelData.B['L2下'] = [4,7];
kennelData.birth['L1'] = [5];

const parts = ['山口 美恵子','みな','和田 美恵子'];
const hourly = [1050, 980, 1020];
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let currentKennel = 'A';
let currentCageKey = null;
let currentCageMax = 2;
let activeDogId = null;

// ================= 犬の管理 =================
function renderDogs() {
  const grid = document.getElementById('dog-grid');
  grid.innerHTML = dogs.map(d => {
    const locLabel = d.location === 'birth' ? 'お産部屋' : d.location === 'A' ? '犬舎A' : d.location === 'B' ? '犬舎B' : '未配置';
    return `<div class="dog-card" onclick="openDetail(${d.id})">
      <div class="dog-avatar" style="background:${d.bg};">${d.emoji}</div>
      <h3>${d.name}</h3>
      <p class="breed">${d.breed}</p>
      <span class="badge ${d.gender==='female'?'badge-f':'badge-m'}">${d.gender==='female'?'メス':'オス'}</span>
      <span class="badge badge-loc">${locLabel}</span>
    </div>`;
  }).join('');
}

function openDetail(id) {
  activeDogId = id;
  const d = dogs.find(x=>x.id===id);
  document.getElementById('d-avatar').style.background = d.bg;
  document.getElementById('d-avatar').textContent = d.emoji;
  document.getElementById('d-name').textContent = d.name;
  const locLabel = d.location==='birth'?'お産部屋':d.location==='A'?'犬舎A':d.location==='B'?'犬舎B':'未配置';
  document.getElementById('d-meta').textContent = `${d.breed} ／ ${d.gender==='female'?'メス':'オス'} ／ 生年月日：${d.born} ／ ${locLabel}`;
  document.getElementById('birth-history').style.display = d.gender==='female' ? 'block' : 'none';
  document.getElementById('dog-memo').value = d.memo || '';
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  activeDogId = null;
}

function saveMemo() {
  if (!activeDogId) return;
  const d = dogs.find(x=>x.id===activeDogId);
  if (d) d.memo = document.getElementById('dog-memo').value;
  const btn = document.querySelector('.save-btn');
  btn.textContent = '✓ 保存しました';
  setTimeout(()=>{ btn.textContent = '保存'; }, 1500);
}

function showAddDogModal() {
  document.getElementById('new-name').value = '';
  document.getElementById('new-breed').value = '';
  document.getElementById('new-born').value = '';
  document.getElementById('add-dog-overlay').classList.add('open');
}

function addDog() {
  const name = document.getElementById('new-name').value.trim();
  const breed = document.getElementById('new-breed').value.trim();
  const gender = document.getElementById('new-gender').value;
  const born = document.getElementById('new-born').value.trim();
  if (!name || !breed) return alert('名前と犬種は必須です');
  const idx = dogs.length % EMOJIS.length;
  dogs.push({ id: nextDogId++, name, breed, gender, born, emoji: EMOJIS[idx], bg: BG_COLORS[idx], location: null, memo: '' });
  closeModal('add-dog-overlay');
  renderDogs();
}

// ================= 犬舎 =================
function dogById(id) { return dogs.find(d=>d.id===id); }

function getStats(kennel) {
  let used=0, total=0, count=0;
  Object.values(kennelData[kennel]).forEach(arr => {
    total++;
    if (arr.length>0) { used++; count+=arr.length; }
  });
  return {used,total,count};
}

function cageHTML(kennel, key, label, max) {
  const ids = kennelData[kennel][key] || [];
  const cls = ids.length>=max ? 'full' : ids.length>0 ? 'half' : 'empty';
  const tagsHTML = ids.length===0
    ? '<span class="empty-tag">空き</span>'
    : ids.map(id => {
        const d = dogById(id);
        if (!d) return '';
        return `<span class="dog-tag ${d.gender}">${d.emoji} ${d.name}</span>`;
      }).join('');

  // お産部屋のケージには出産情報を表示
  let birthInfoHTML = '';
  if (kennel === 'birth' && ids.length > 0) {
    const info = birthInfoStore[key];
    const dogId = ids[0];
    const d = dogById(dogId);
    const dName = d ? d.name : '';
    if (info && (info.due || info.birth || info.male || info.female)) {
      birthInfoHTML = `<div class="birth-info">
        ${info.due   ? `<div>予定日: <span class="bdate">${info.due}</span></div>` : ''}
        ${info.birth ? `<div>出産日: <span class="bdate">${info.birth}</span></div>` : ''}
        ${(info.male!==''||info.female!=='') ? `<div>♂${info.male||0} ♀${info.female||0}${info.dead>0?` 死産${info.dead}`:''}</div>` : ''}
      </div>
      <button onclick="event.stopPropagation();openBirthInfoModal('${key}','${dName}')" style="margin-top:4px;font-size:10px;color:#E8934A;background:none;border:1px solid #F5C97A;border-radius:6px;padding:2px 8px;cursor:pointer;width:100%;">出産情報を編集</button>`;
    } else {
      birthInfoHTML = `<button onclick="event.stopPropagation();openBirthInfoModal('${key}','${dName}')" style="margin-top:4px;font-size:10px;color:#AAA;background:none;border:1px dashed #DDD;border-radius:6px;padding:2px 8px;cursor:pointer;width:100%;">🍼 出産情報を入力</button>`;
    }
  }

  return `<div class="cage ${cls}" onclick="openCageModal('${kennel}','${key}',${max})">
    <div class="cage-id">${label}</div>
    <div class="cage-dogs">${tagsHTML}</div>
    ${birthInfoHTML}
  </div>`;
}

function renderKennel(kennel) {
  const el = document.getElementById('kv-'+kennel);
  const isBirth = kennel==='birth';
  const rows = 10;
  const max = isBirth ? 1 : 2;
  const s = getStats(kennel);
  const capacity = isBirth ? s.total : s.total*2;

  let leftHTML='', rightHTML='';
  for (let r=1;r<=rows;r++) {
    if (isBirth) {
      leftHTML += cageHTML(kennel, `L${r}`, `左 ${r}番`, max);
      if (r<rows) leftHTML += '<div style="height:5px;"></div>';
      rightHTML += cageHTML(kennel, `R${r}`, `右 ${r}番`, max);
      if (r<rows) rightHTML += '<div style="height:5px;"></div>';
    } else {
      leftHTML += `<div class="row-label">${r}列</div>`;
      leftHTML += cageHTML(kennel, `L${r}上`, `左${r} 上段`, max);
      leftHTML += cageHTML(kennel, `L${r}下`, `左${r} 下段`, max);
      if (r<rows) leftHTML += '<div style="height:5px;"></div>';
      rightHTML += `<div class="row-label">${r}列</div>`;
      rightHTML += cageHTML(kennel, `R${r}上`, `右${r} 上段`, max);
      rightHTML += cageHTML(kennel, `R${r}下`, `右${r} 下段`, max);
      if (r<rows) rightHTML += '<div style="height:5px;"></div>';
    }
  }

  el.innerHTML = `
    <div class="stats-bar">
      <div class="stat"><strong>${s.count}</strong>頭在室</div>
      <div class="stat"><strong>${s.used}/${s.total}</strong>ケージ使用中</div>
      <div class="stat"><strong>${capacity-s.count}</strong>頭収容可能</div>
    </div>
    <div class="kennel-layout">
      <div class="cage-col">${leftHTML}</div>
      <div class="aisle">通　路</div>
      <div class="cage-col">${rightHTML}</div>
    </div>
  `;
}

function openCageModal(kennel, key, max) {
  currentKennel=kennel; currentCageKey=key; currentCageMax=max;
  const ids = kennelData[kennel][key]||[];
  const isFull = ids.length>=max;
  document.getElementById('modal-cage-title').textContent = `ケージ ${key}`;

  let body = ids.length===0
    ? '<p style="font-size:13px;color:#BBB;padding:8px 0;">空きケージです</p>'
    : ids.map((id,i) => {
        const d = dogById(id);
        if (!d) return '';
        return `<div class="modal-dog-row">
          <span class="dog-tag ${d.gender}" style="font-size:13px;">${d.emoji} ${d.name}</span>
          <button class="mremove" onclick="removeDogFromCage(${i})">移動・解除</button>
        </div>`;
      }).join('');
  document.getElementById('modal-cage-body').innerHTML = body;

  // 選択肢：現在のケージにいないかつ他の場所との整合性あり
  const sel = document.getElementById('cage-dog-select');
  if (isFull) {
    sel.innerHTML = '<option>満員です</option>';
    sel.disabled = true;
  } else {
    // お産部屋に移動する場合は犬舎のケージからも除外
    const availableDogs = dogs.filter(d => !ids.includes(d.id));
    sel.innerHTML = availableDogs.length===0
      ? '<option>割り当て可能な犬がいません</option>'
      : availableDogs.map(d => `<option value="${d.id}">${d.emoji} ${d.name}（${d.gender==='female'?'メス':'オス'}）</option>`).join('');
    sel.disabled = availableDogs.length===0;
  }
  document.getElementById('cage-overlay').classList.add('open');
}

function removeDogFromCage(idx) {
  const ids = kennelData[currentKennel][currentCageKey];
  const dogId = ids[idx];
  ids.splice(idx,1);
  // dogのlocationをリセット
  const d = dogs.find(x=>x.id===dogId);
  if (d) d.location = null;
  renderKennel(currentKennel);
  renderDogs();
  openCageModal(currentKennel, currentCageKey, currentCageMax);
}

function assignDog() {
  const sel = document.getElementById('cage-dog-select');
  const dogId = parseInt(sel.value);
  if (!dogId || isNaN(dogId)) return;
  const cage = kennelData[currentKennel][currentCageKey];
  if (cage.length>=currentCageMax) return;

  // お産部屋に移動する場合、犬舎A・Bから削除する
  if (currentKennel==='birth') {
    ['A','B'].forEach(k => {
      Object.keys(kennelData[k]).forEach(key => {
        const arr = kennelData[k][key];
        const i = arr.indexOf(dogId);
        if (i!==-1) arr.splice(i,1);
      });
    });
  }
  // 犬舎A・Bに移動する場合、お産部屋から削除する
  if (currentKennel==='A' || currentKennel==='B') {
    Object.keys(kennelData.birth).forEach(key => {
      const arr = kennelData.birth[key];
      const i = arr.indexOf(dogId);
      if (i!==-1) arr.splice(i,1);
    });
  }

  cage.push(dogId);
  const d = dogs.find(x=>x.id===dogId);
  if (d) d.location = currentKennel;
  renderKennel(currentKennel);
  renderDogs();
  openCageModal(currentKennel, currentCageKey, currentCageMax);
}

// ================= シフト =================
const shiftStore = {};
function shiftKey(name, y, m, d) { return `${name}_${y}_${m}_${d}`; }

function initShift() {
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  parts.forEach(name => {
    for (let d=1;d<=daysInMonth;d++) {
      const dow = new Date(currentYear,currentMonth,d).getDay();
      const k = shiftKey(name,currentYear,currentMonth,d);
      if (!(k in shiftStore)) {
        shiftStore[k] = (dow===0||dow===6) ? null : (Math.random()>0.35 ? '9:00-15:00' : null);
      }
    }
  });
}

function renderShift() {
  document.getElementById('month-label').textContent = `${currentYear}年${currentMonth+1}月`;
  initShift();
  const daysInMonth = new Date(currentYear,currentMonth+1,0).getDate();
  const DOWS = ['日','月','火','水','木','金','土'];
  let html = '<thead><tr><th class="name-col">スタッフ</th>';
  for (let d=1;d<=daysInMonth;d++) {
    const dow = new Date(currentYear,currentMonth,d).getDay();
    const cls = dow===0?'sun':dow===6?'sat':'';
    html += `<th class="${cls}">${d}<br><span style="font-size:9px;">${DOWS[dow]}</span></th>`;
  }
  html += '</tr></thead><tbody>';
  parts.forEach(name => {
    html += `<tr><td class="name-col">${name.split(' ')[1]}</td>`;
    for (let d=1;d<=daysInMonth;d++) {
      const dow = new Date(currentYear,currentMonth,d).getDay();
      const v = shiftStore[shiftKey(name,currentYear,currentMonth,d)];
      const isWe = dow===0||dow===6;
      if (v) html += `<td><span class="scell">${v}</span></td>`;
      else html += `<td><span class="scell off">${isWe?'休':'－'}</span></td>`;
    }
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('shift-table').innerHTML = html;
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth>11) { currentMonth=0; currentYear++; }
  if (currentMonth<0) { currentMonth=11; currentYear--; }
  renderShift();
  renderWage();
}

// ================= 給与 =================
function calcWorkData(partIdx) {
  const name = parts[partIdx];
  const daysInMonth = new Date(currentYear,currentMonth+1,0).getDate();
  let workDays=0, totalHours=0;
  for (let d=1;d<=daysInMonth;d++) {
    const v = shiftStore[shiftKey(name,currentYear,currentMonth,d)];
    if (v) {
      workDays++;
      const [start,end] = v.split('-').map(t => { const [h,m]=t.split(':'); return parseInt(h)+parseInt(m)/60; });
      totalHours += (end-start);
    }
  }
  return {workDays, totalHours};
}

function renderWage() {
  const hourlyList = document.getElementById('hourly-list');
  hourlyList.innerHTML = parts.map((p,i) =>
    `<div class="hourly-row">
      <span>${p}</span>
      <div style="display:flex;align-items:center;gap:4px;">
        <input type="number" value="${hourly[i]}" onchange="hourly[${i}]=parseInt(this.value)||0; renderWageCards();" />
        <span style="font-size:12px;color:#AAA;">円/時</span>
      </div>
    </div>`
  ).join('');
  renderWageCards();
}

function renderWageCards() {
  initShift();
  document.getElementById('wage-cards').innerHTML = parts.map((p,i) => {
    const {workDays, totalHours} = calcWorkData(i);
    const total = Math.round(totalHours * hourly[i]);
    return `<div class="wage-card">
      <div class="wname">${p}</div>
      <div class="whours">${workDays}日 / ${totalHours.toFixed(1)}h</div>
      <div class="wamt"><span class="wyen">¥</span>${total.toLocaleString()}</div>
    </div>`;
  }).join('');
}

// ================= 交配管理 =================
let breedRecords = [
  { id:1, femaleId:1, maleId:3, status:'pregnant', matingDate:'2026-03-15', dueDate:'2026-05-17', birthDate:'', maleCount:'', femaleCount:'', deadCount:'' },
  { id:2, femaleId:2, maleId:4, status:'planned',  matingDate:'2026-05-01', dueDate:'', birthDate:'', maleCount:'', femaleCount:'', deadCount:'' },
  { id:3, femaleId:6, maleId:3, status:'done',     matingDate:'2026-01-10', dueDate:'2026-03-14', birthDate:'2026-03-15', maleCount:'2', femaleCount:'3', deadCount:'0' },
];
let nextBreedId = 4;

const STATUS_LABEL = { pregnant:'妊娠中', planned:'交配予定', done:'完了' };
const STATUS_CLS   = { pregnant:'pregnant', planned:'planned', done:'done' };

function renderBreed() {
  const el = document.getElementById('breed-list');
  if (!breedRecords.length) {
    el.innerHTML = '<p style="color:#BBB;font-size:13px;padding:20px 0;text-align:center;">交配記録がありません</p>';
    return;
  }
  el.innerHTML = breedRecords.map(r => {
    const fm = dogs.find(d=>d.id===r.femaleId);
    const ml = dogs.find(d=>d.id===r.maleId);
    const fName = fm ? fm.name : '—';
    const mName = ml ? ml.name : '—';
    const hasResult = r.status==='done' && (r.maleCount!=='' || r.femaleCount!=='');
    return `<div class="breed-card">
      <button class="breed-del" onclick="deleteBreed(${r.id})" title="削除">✕</button>
      <div class="breed-card-top">
        <div class="breed-pair">♀ ${fName} × ♂ ${mName}</div>
        <span class="bstatus ${STATUS_CLS[r.status]}">${STATUS_LABEL[r.status]}</span>
      </div>
      <div class="breed-dates">
        <div>交配日<br><span>${r.matingDate||'—'}</span></div>
        <div>出産予定<br><span>${r.dueDate||'—'}</span></div>
        <div>出産日<br><span>${r.birthDate||'—'}</span></div>
        <div></div>
      </div>
      ${hasResult ? `<div class="birth-result">
        <div><div class="bnum">♂ ${r.maleCount||0}</div><div class="blabel">オス</div></div>
        <div><div class="bnum">♀ ${r.femaleCount||0}</div><div class="blabel">メス</div></div>
        <div><div class="bnum">${r.deadCount||0}</div><div class="blabel">死産</div></div>
        <div><div class="bnum">${(parseInt(r.maleCount||0)+parseInt(r.femaleCount||0))}</div><div class="blabel">合計</div></div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function showBreedModal() {
  const females = dogs.filter(d=>d.gender==='female');
  const males   = dogs.filter(d=>d.gender==='male');
  document.getElementById('b-female').innerHTML = females.map(d=>`<option value="${d.id}">♀ ${d.name}（${d.breed}）</option>`).join('');
  document.getElementById('b-male').innerHTML   = males.map(d=>`<option value="${d.id}">♂ ${d.name}（${d.breed}）</option>`).join('');
  ['b-mating-date','b-due-date','b-birth-date','b-male-count','b-female-count','b-dead-count'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('breed-overlay').classList.add('open');
}

function addBreed() {
  const femaleId = parseInt(document.getElementById('b-female').value);
  const maleId   = parseInt(document.getElementById('b-male').value);
  const status   = document.getElementById('b-status').value;
  breedRecords.unshift({
    id: nextBreedId++,
    femaleId, maleId, status,
    matingDate:   document.getElementById('b-mating-date').value,
    dueDate:      document.getElementById('b-due-date').value,
    birthDate:    document.getElementById('b-birth-date').value,
    maleCount:    document.getElementById('b-male-count').value,
    femaleCount:  document.getElementById('b-female-count').value,
    deadCount:    document.getElementById('b-dead-count').value,
  });
  closeModal('breed-overlay');
  renderBreed();
}

function deleteBreed(id) {
  if (!confirm('この交配記録を削除しますか？')) return;
  breedRecords = breedRecords.filter(r=>r.id!==id);
  renderBreed();
}

// ================= お産部屋 出産情報 =================
const birthInfoStore = {}; // key: cageKey → {due, birth, male, female, dead}
let currentBirthCageKey = null;

function openBirthInfoModal(cageKey, dogName) {
  currentBirthCageKey = cageKey;
  document.getElementById('bi-title').textContent = `🍼 ${dogName} の出産情報`;
  const info = birthInfoStore[cageKey] || {};
  document.getElementById('bi-due').value    = info.due    || '';
  document.getElementById('bi-birth').value  = info.birth  || '';
  document.getElementById('bi-male').value   = info.male   || '';
  document.getElementById('bi-female').value = info.female || '';
  document.getElementById('bi-dead').value   = info.dead   || '';
  document.getElementById('birth-info-overlay').classList.add('open');
}

function saveBirthInfo() {
  birthInfoStore[currentBirthCageKey] = {
    due:    document.getElementById('bi-due').value,
    birth:  document.getElementById('bi-birth').value,
    male:   document.getElementById('bi-male').value,
    female: document.getElementById('bi-female').value,
    dead:   document.getElementById('bi-dead').value,
  };
  closeModal('birth-info-overlay');
  renderKennel('birth');
}

// ================= 共通 =================
function switchMain(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`.tab, .bnav-btn`).forEach(t => {
    if (t.dataset.tab === tab || t === el) t.classList.add('active');
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if (tab==='shift') renderShift();
  if (tab==='wage') { initShift(); renderWage(); }
  if (tab==='breed') renderBreed();
}

function switchKennel(k, el) {
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.kview').forEach(v=>v.classList.remove('active'));
  document.getElementById('kv-'+k).classList.add('active');
  currentKennel=k;
  renderKennel(k);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// 初期描画
renderDogs();
renderKennel('A');
</script>
