<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8832A">
<title>LillyBell - 管理画面完全版</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #FFF0E4; color: #1A1A1A; min-height: 100vh; }

/* ヘッダー */
.app-header {
  background: linear-gradient(135deg, #E8832A 0%, #F0AA40 100%);
  padding: 14px 16px 0; color: #fff;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 10px rgba(180,80,0,0.25);
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.header-top h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
.header-top .subtitle { font-size: 11px; opacity: 0.85; margin-top: 2px; }
.tab-bar { display: flex; gap: 2px; overflow-x: auto; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  padding: 9px 16px; font-size: 13px; font-weight: 600;
  border-radius: 8px 8px 0 0; cursor: pointer; border: none;
  background: rgba(255,255,255,0.25); color: rgba(255,255,255,0.9);
  white-space: nowrap; transition: background 0.15s;
}
.tab.active { background: #FFF0E4; color: #C05A10; }

/* コンテンツ */
.content { padding: 16px; max-width: 800px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }

/* サブタブ・フィルタボタン */
.sub-tabs, .filter-group { display: flex; gap: 8px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; }
.sub-tabs::-webkit-scrollbar, .filter-group::-webkit-scrollbar { display: none; }
.stab {
  padding: 7px 16px; font-size: 12px; font-weight: 600;
  border-radius: 20px; cursor: pointer; white-space: nowrap;
  border: 2px solid #D0A080; background: #fff; color: #A06040; transition: all 0.15s;
}
.stab.active { background: #E8832A; color: #fff; border-color: #E8832A; }

/* 犬カード */
.dog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; margin-bottom: 16px; }
.dog-card { background: #fff; border: 2px solid #E0C8B0; border-radius: 14px; padding: 13px; cursor: pointer; position: relative; }
.dog-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 23px; margin-bottom: 8px; }
.dog-card h3 { font-size: 15px; margin-bottom: 3px; }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.badge-f { background: #F5D0DC; color: #882244; }
.badge-m { background: #C8DEFF; color: #114488; }

/* リスト表示 */
.dog-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.dog-list-row { background: #fff; border: 2px solid #E0C8B0; border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; }

/* その他UI */
.view-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
.vtoggle-btn { padding: 6px 14px; font-size: 13px; border-radius: 20px; cursor: pointer; border: 2px solid #D0A080; background: #fff; }
.vtoggle-btn.active { background: #E8832A; color: #fff; }
.add-btn { width: 100%; padding: 12px; border: 2px dashed #D0A080; border-radius: 12px; background: transparent; cursor: pointer; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 200; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 18px; padding: 20px; width: 320px; max-height: 90vh; overflow-y: auto; }
.save-btn { background: #E8832A; color: #fff; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }

/* ボトムナビ */
.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid #E0C0A0; padding: 6px 0; z-index: 100; }
@media (max-width: 600px) { .bottom-nav { display: block; } .content { padding-bottom: 80px; } }
.bottom-nav-inner { display: flex; justify-content: space-around; }
.bnav-btn { background: none; border: none; font-size: 10px; color: #B09070; }
.bnav-btn.active { color: #E8832A; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <h1>🌸 LillyBell</h1>
    <div class="subtitle">犬舎総合管理システム</div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchMain('dogs',this)">🐶 犬の管理</button>
    <button class="tab" onclick="switchMain('kennel',this)">🏠 犬舎</button>
    <button class="tab" onclick="switchMain('breed',this)">💕 交配</button>
  </div>
</div>

<div class="content">
  <div class="page active" id="page-dogs">
    <div class="view-toggle">
      <button class="vtoggle-btn active" id="btn-grid-view" onclick="switchDogView('grid')">▞ グリッド</button>
      <button class="vtoggle-btn" id="btn-list-view" onclick="switchDogView('list')">☰ リスト</button>
    </div>

    <div class="filter-group">
      <button class="stab active f-breed" onclick="filterDogs('breed', 'all', this)">すべて</button>
      <button class="stab f-breed" onclick="filterDogs('breed', 'ミニチュアダックス', this)">ダックス</button>
      <button class="stab f-breed" onclick="filterDogs('breed', 'トイプードル', this)">プードル</button>
      <button class="stab f-breed" onclick="filterDogs('breed', 'マルチーズ', this)">マル</button>
      <button class="stab f-breed" onclick="filterDogs('breed', 'ミックス', this)">ミックス</button>
    </div>
    <div class="filter-group">
      <button class="stab active f-gender" onclick="filterDogs('gender', 'all', this)">性別すべて</button>
      <button class="stab f-gender" onclick="filterDogs('gender', 'male', this)">オス ♂</button>
      <button class="stab f-gender" onclick="filterDogs('gender', 'female', this)">メス ♀</button>
    </div>

    <div id="dog-grid" class="dog-grid"></div>
    <div id="dog-list" class="dog-list" style="display:none;"></div>
    
    <button class="add-btn" onclick="openModal('add-dog-overlay')">＋ 犬を追加</button>
  </div>

  <div class="page" id="page-kennel"><div class="loading">犬舎機能</div></div>
  <div class="page" id="page-breed"><div class="loading">交配記録機能</div></div>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-btn active" onclick="switchMain('dogs',this)"><span>🐶</span><br>犬</button>
    <button class="bnav-btn" onclick="switchMain('kennel',this)"><span>🏠</span><br>犬舎</button>
    <button class="bnav-btn" onclick="switchMain('breed',this)"><span>💕</span><br>交配</button>
  </div>
</nav>

<div class="overlay" id="add-dog-overlay">
  <div class="modal">
    <h3>犬を追加</h3>
    <input class="save-btn" style="width:100%;margin-bottom:10px" id="new-name" placeholder="名前">
    <select id="new-breed" style="width:100%;padding:10px;margin-bottom:10px">
      <option value="ミニチュアダックス">ミニチュアダックス</option>
      <option value="トイプードル">トイプードル</option>
      <option value="マルチーズ">マルチーズ</option>
      <option value="ミックス">ミックス</option>
    </select>
    <select id="new-gender" style="width:100%;padding:10px;margin-bottom:10px">
      <option value="male">オス</option>
      <option value="female">メス</option>
    </select>
    <button class="save-btn" style="width:100%" onclick="saveDog()">追加</button>
    <button onclick="closeModal('add-dog-overlay')" style="width:100%;margin-top:5px;background:none;border:none;color:grey">キャンセル</button>
  </div>
</div>

<script>
// ================= 設定・状態 =================
const SUPA_URL = 'https://akrtgasyenuptcoezwhs.supabase.co';
const SUPA_KEY = 'sb_publishable_VbnT0A4f8QdDLkBXYC7sOw_k2cUVXTh';

let dogs = [];
let dogViewMode = 'grid';
let currentFilter = { breed: 'all', gender: 'all' };

// ================= API関数 =================
async function supaFetch(path, method='GET', body=null) {
  const headers = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  return await res.json();
}

// ================= 抽出ロジック =================
function filterDogs(type, value, btn) {
  const groupClass = type === 'breed' ? '.f-breed' : '.f-gender';
  document.querySelectorAll(groupClass).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  currentFilter[type] = value;
  renderDogs();
}

// ================= 描画 =================
function renderDogs() {
  const grid = document.getElementById('dog-grid');
  const list = document.getElementById('dog-list');

  // フィルタリング実行
  const filtered = dogs.filter(d => {
    const breedMatch = currentFilter.breed === 'all' || d.breed.includes(currentFilter.breed);
    const genderMatch = currentFilter.gender === 'all' || d.gender === currentFilter.gender;
    return breedMatch && genderMatch;
  });

  const htmlGrid = filtered.map(d => `
    <div class="dog-card">
      <div class="dog-avatar" style="background:#FFE0EC">${d.gender==='female'?'🐩':'🐕'}</div>
      <h3>${d.name}</h3>
      <div style="font-size:12px;color:gray">${d.breed}</div>
      <span class="badge ${d.gender==='female'?'badge-f':'badge-m'}">${d.gender==='female'?'♀':'♂'}</span>
    </div>
  `).join('');

  const htmlList = filtered.map(d => `
    <div class="dog-list-row">
      <div class="dog-list-info">
        <strong>${d.name}</strong> <small>(${d.breed})</small>
      </div>
      <span class="badge ${d.gender==='female'?'badge-f':'badge-m'}">${d.gender==='female'?'♀':'♂'}</span>
    </div>
  `).join('');

  grid.innerHTML = htmlGrid || '<p>該当なし</p>';
  list.innerHTML = htmlList || '<p>該当なし</p>';
}

// ================= アクション =================
async function loadData() {
  try {
    dogs = await supaFetch('dogs?select=*');
    renderDogs();
  } catch (e) { console.error("データ取得失敗", e); }
}

async function saveDog() {
  const name = document.getElementById('new-name').value;
  const breed = document.getElementById('new-breed').value;
  const gender = document.getElementById('new-gender').value;
  if(!name) return alert("名前を入れてね");

  await supaFetch('dogs', 'POST', { name, breed, gender });
  closeModal('add-dog-overlay');
  loadData();
}

function switchMain(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  document.querySelectorAll('.tab, .bnav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function switchDogView(mode) {
  dogViewMode = mode;
  document.getElementById('dog-grid').style.display = mode === 'grid' ? 'grid' : 'none';
  document.getElementById('dog-list').style.display = mode === 'list' ? 'flex' : 'none';
  document.getElementById('btn-grid-view').classList.toggle('active', mode === 'grid');
  document.getElementById('btn-list-view').classList.toggle('active', mode === 'list');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// 初期化
window.onload = loadData;
</script>
</body>
</html>
