<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8832A">
<title>LillyBell</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #FFF0E4; color: #1A1A1A; min-height: 100vh; }
 
/* ヘッダー */
.app-header {
  background: linear-gradient(135deg, #E8832A 0%, #F0AA40 100%);
  padding: 14px 16px 0; color: #fff;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 10px rgba(180,80,0,0.25);
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.header-top h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
.header-top .subtitle { font-size: 11px; opacity: 0.85; margin-top: 2px; }
.tab-bar { display: flex; gap: 2px; overflow-x: auto; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  padding: 9px 16px; font-size: 13px; font-weight: 600;
  border-radius: 8px 8px 0 0; cursor: pointer; border: none;
  background: rgba(255,255,255,0.25); color: rgba(255,255,255,0.9);
  white-space: nowrap; transition: background 0.15s;
}
.tab.active { background: #FFF0E4; color: #C05A10; }
.tab:hover:not(.active) { background: rgba(255,255,255,0.35); }
 
/* コンテンツ */
.content { padding: 16px; max-width: 800px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }
 
/* サブタブ */
.sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.stab {
  padding: 7px 16px; font-size: 13px; font-weight: 600;
  border-radius: 20px; cursor: pointer;
  border: 2px solid #D0A080; background: #fff; color: #A06040; transition: all 0.15s;
}
.stab.active { background: #E8832A; color: #fff; border-color: #E8832A; }
.kview { display: none; }
.kview.active { display: block; }
 
/* 統計バー */
.stats-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.stat { background: #fff; border: 2px solid #E0C0A0; border-radius: 10px; padding: 8px 14px; font-size: 12px; color: #805030; font-weight: 500; }
.stat strong { font-size: 20px; font-weight: 700; color: #C05A10; display: block; }
 
/* 犬舎レイアウト */
.kennel-layout { display: grid; grid-template-columns: 1fr 36px 1fr; gap: 6px; align-items: start; }
.aisle {
  background: #E8C89A; border: 2px solid #C0A070; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #705030; font-weight: 600;
  writing-mode: vertical-rl; padding: 10px 0; min-height: 200px;
}
.cage-col { display: flex; flex-direction: column; gap: 5px; }
.row-label { font-size: 10px; color: #A08060; font-weight: 600; margin-bottom: 2px; padding-left: 2px; }
 
.cage {
  border: 2px solid #D8C0A8; border-radius: 10px;
  padding: 7px 9px; cursor: pointer; background: #FFF8F4; min-height: 54px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.cage:hover { border-color: #E8832A; box-shadow: 0 0 0 3px rgba(232,131,42,0.15); }
.cage.full { background: #FFF0E0; border-color: #E8A060; }
.cage.half { background: #FFF8EE; border-color: #E8C090; }
.cage.empty { background: #F5F0EA; border-color: #D0C0B0; }
.cage-id { font-size: 9px; color: #B09070; font-weight: 600; margin-bottom: 3px; }
.cage-dogs { display: flex; flex-direction: column; gap: 3px; }
.dog-tag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; width: fit-content; }
.dog-tag.female { background: #F5D0DC; color: #882244; }
.dog-tag.male   { background: #C8DEFF; color: #114488; }
.empty-tag { font-size: 10px; color: #B0A090; }
.birth-info { margin-top: 5px; padding-top: 5px; border-top: 1px solid #E0C8B0; font-size: 10px; color: #806040; line-height: 1.8; font-weight: 500; }
.birth-info .bdate { color: #C05A10; font-weight: 700; }
 
/* ===== 犬の管理 ビュー切り替え ===== */
.view-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
.vtoggle-btn {
  padding: 6px 14px; font-size: 13px; font-weight: 600;
  border-radius: 20px; cursor: pointer;
  border: 2px solid #D0A080; background: #fff; color: #A06040; transition: all 0.15s;
}
.vtoggle-btn.active { background: #E8832A; color: #fff; border-color: #E8832A; }
 
/* 犬カード (グリッドビュー) */
.dog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; margin-bottom: 16px; }
.dog-card { background: #fff; border: 2px solid #E0C8B0; border-radius: 14px; padding: 13px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; }
.dog-card:hover { border-color: #E8832A; box-shadow: 0 2px 10px rgba(232,131,42,0.15); }
.dog-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 23px; margin-bottom: 8px; }
.dog-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; color: #1A1A1A; }
.dog-card .breed { font-size: 12px; color: #806040; margin-bottom: 7px; }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.badge-f { background: #F5D0DC; color: #882244; }
.badge-m { background: #C8DEFF; color: #114488; }
.badge-loc { background: #FFE8CC; color: #804020; font-size: 10px; margin-left: 4px; }
.dog-del-btn {
  position: absolute; top: 8px; right: 8px;
  background: #F0E0D0; border: none; color: #A08060; font-size: 13px;
  cursor: pointer; line-height: 1; width: 22px; height: 22px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.dog-del-btn:hover { background: #E8832A; color: #fff; }
 
/* 犬リストビュー */
.dog-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.dog-list-row {
  background: #fff; border: 2px solid #E0C8B0; border-radius: 12px;
  padding: 10px 14px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative;
}
.dog-list-row:hover { border-color: #E8832A; box-shadow: 0 2px 8px rgba(232,131,42,0.15); }
.dog-list-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
.dog-list-info { flex: 1; min-width: 0; }
.dog-list-name { font-size: 15px; font-weight: 700; color: #1A1A1A; }
.dog-list-sub { font-size: 12px; color: #806040; margin-top: 2px; font-weight: 500; }
.dog-list-badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.dog-list-del {
  background: #F0E0D0; border: none; color: #A08060; font-size: 13px;
  cursor: pointer; width: 22px; height: 22px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.dog-list-del:hover { background: #E8832A; color: #fff; }
 
.add-btn {
  width: 100%; padding: 12px; border: 2px dashed #D0A080;
  border-radius: 12px; background: transparent; color: #A06040;
  font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 20px; transition: all 0.15s;
}
.add-btn:hover { background: #FFF0E0; border-color: #E8832A; color: #C05A10; }
.add-btn-sm {
  padding: 7px 16px; border: none; border-radius: 8px;
  background: #E8832A; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
}
.add-btn-sm:hover { background: #C05A10; }
 
/* 詳細パネル */
.detail-panel { display: none; background: #fff; border: 2px solid #E0C0A0; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.detail-panel.open { display: block; }
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 2px solid #F0E0D0; }
.detail-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.detail-header h2 { font-size: 18px; font-weight: 700; color: #1A1A1A; }
.detail-header .meta { font-size: 12px; color: #806040; margin-top: 3px; font-weight: 500; }
.record-section { margin-bottom: 14px; }
.record-section h4 { font-size: 11px; font-weight: 700; color: #B09070; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.close-btn { float: right; background: #F0E0D0; border: none; font-size: 14px; cursor: pointer; color: #806040; width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
.close-btn:hover { background: #E8832A; color: #fff; }
.memo-box { width: 100%; min-height: 70px; font-size: 14px; padding: 10px; border: 2px solid #D8C0A8; border-radius: 10px; background: #FFF8F4; color: #1A1A1A; resize: vertical; font-family: inherit; }
.save-btn { margin-top: 8px; padding: 10px 20px; border-radius: 10px; border: none; background: #E8832A; color: #fff; font-size: 14px; cursor: pointer; font-weight: 700; }
.save-btn:hover { background: #C05A10; }
.edit-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
 
/* シフトカレンダー */
.month-nav { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.month-nav button { background: #fff; border: 2px solid #D8C0A8; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px; color: #805030; font-weight: 600; }
.month-nav button:hover { background: #FFF0E0; border-color: #E8832A; }
.month-nav span { font-size: 17px; font-weight: 700; color: #1A1A1A; }
 
/* シフト凡例 */
.shift-legend { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.shift-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: #555; }
.shift-legend-dot { width: 12px; height: 12px; border-radius: 3px; }
 
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 16px; }
.cal-dow { text-align: center; font-size: 12px; font-weight: 700; padding: 5px 0; color: #806040; }
.cal-dow.sun { color: #CC2222; }
.cal-dow.sat { color: #1144AA; }
.cal-cell { background: #fff; border: 2px solid #E0C8B0; border-radius: 8px; padding: 5px; min-height: 68px; cursor: pointer; transition: border-color 0.15s; }
.cal-cell:hover { border-color: #E8832A; }
.cal-cell.empty-cell { background: transparent; border-color: transparent; cursor: default; }
.cal-cell.today { border-color: #E8832A; background: #FFF5EE; }
.cal-date { font-size: 12px; font-weight: 700; margin-bottom: 3px; color: #1A1A1A; }
.cal-date.sun { color: #CC2222; }
.cal-date.sat { color: #1144AA; }
.cal-shifts { display: flex; flex-direction: column; gap: 2px; }
/* スタッフ別シフトカラー (3人分) */
.cal-shift-tag { font-size: 9px; border-radius: 4px; padding: 1px 4px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shift-color-0 { background: #C8EFC8; color: #1A5A1A; }
.shift-color-1 { background: #C8DEFF; color: #112288; }
.shift-color-2 { background: #FFE0C0; color: #804020; }
.shift-color-3 { background: #F5D0DC; color: #882244; }
.shift-color-4 { background: #E8E0FF; color: #442288; }
 
/* シフト編集モーダル */
.staff-shift-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.staff-shift-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.staff-shift-row label { width: 56px; flex-shrink: 0; font-weight: 700; color: #1A1A1A; font-size: 13px; }
.staff-shift-row input[type=time] { flex: 1; padding: 6px 8px; border: 2px solid #D8C0A8; border-radius: 8px; font-size: 13px; font-family: inherit; background: #FFF8F4; color: #1A1A1A; }
.time-sep { font-size: 12px; color: #B09070; font-weight: 600; }
/* シフトモーダル スタッフ名カラードット */
.shift-dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; vertical-align: middle; }
 
/* 給与 */
.wage-section { margin-bottom: 20px; }
.wage-section h3 { font-size: 12px; font-weight: 700; color: #A08060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.hourly-box { background: #fff; border: 2px solid #E0C0A0; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
.hourly-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0E0D0; font-size: 14px; font-weight: 600; color: #1A1A1A; }
.hourly-row:last-child { border-bottom: none; }
.hourly-row input { width: 90px; text-align: right; font-size: 14px; padding: 5px 8px; border: 2px solid #D8C0A8; border-radius: 8px; background: #FFF8F4; color: #1A1A1A; font-family: inherit; font-weight: 600; }
.wage-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.wage-card { background: #fff; border-radius: 14px; border: 2px solid #E0C0A0; padding: 14px 16px; }
.wage-card .wname { font-size: 14px; font-weight: 700; margin-bottom: 5px; color: #1A1A1A; }
.wage-card .whours { font-size: 12px; color: #A08060; margin-bottom: 10px; font-weight: 500; }
.wage-card .wamt { font-size: 26px; font-weight: 700; color: #C05A10; }
.wage-card .wyen { font-size: 15px; }
 
/* スタッフ管理 */
.staff-card { background: #fff; border: 2px solid #E0C0A0; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
.staff-icon { width: 40px; height: 40px; border-radius: 50%; background: #FFE0C0; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.staff-info { flex: 1; }
.staff-info .sname { font-size: 15px; font-weight: 700; color: #1A1A1A; }
.staff-info .swage { font-size: 12px; color: #A08060; margin-top: 2px; font-weight: 500; }
.staff-edit-btn { padding: 6px 12px; border: 2px solid #D8C0A8; border-radius: 8px; background: #FFF8F4; color: #806040; font-size: 12px; font-weight: 600; cursor: pointer; }
.staff-edit-btn:hover { border-color: #E8832A; color: #C05A10; background: #FFF0E0; }
 
/* 交配管理 */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.section-title { font-size: 14px; color: #806040; font-weight: 600; }
.breed-card { background: #fff; border: 2px solid #E0C0A0; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; position: relative; }
.breed-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.breed-pair { font-size: 15px; font-weight: 700; color: #1A1A1A; }
.bstatus { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 700; }
.bstatus.pregnant { background: #C8EEC8; color: #1A5A1A; }
.bstatus.planned  { background: #C8DEFF; color: #112288; }
.bstatus.done     { background: #E8E8E8; color: #444444; }
.breed-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: #A08060; margin-bottom: 8px; font-weight: 500; }
.breed-dates span { color: #1A1A1A; font-weight: 700; display: block; margin-top: 2px; }
.birth-result { display: flex; gap: 12px; flex-wrap: wrap; background: #FFF0E0; border-radius: 8px; padding: 10px 12px; font-size: 12px; margin-top: 8px; }
.birth-result .bnum { font-weight: 700; font-size: 16px; color: #C05A10; }
.birth-result .blabel { color: #A08060; font-size: 11px; font-weight: 500; }
.breed-del { position: absolute; top: 10px; right: 10px; background: #F0E0D0; border: none; color: #A08060; font-size: 12px; cursor: pointer; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.breed-del:hover { background: #E8832A; color: #fff; }
 
/* モーダル */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 200; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 18px; padding: 20px; width: 320px; max-width: 93vw; box-shadow: 0 12px 40px rgba(0,0,0,0.2); max-height: 92vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: #1A1A1A; }
.modal-close { float: right; background: #F0E0D0; border: none; font-size: 13px; cursor: pointer; color: #806040; width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
.modal-close:hover { background: #E8832A; color: #fff; }
.modal-dog-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #F0E0D0; font-size: 14px; }
.modal-dog-row:last-child { border-bottom: none; }
.mremove { font-size: 12px; color: #CC2222; cursor: pointer; background: #FFE0E0; border: none; padding: 4px 10px; border-radius: 8px; font-weight: 600; }
.mremove:hover { background: #CC2222; color: #fff; }
.madd-row { display: flex; gap: 8px; margin-top: 12px; }
.madd-row select { flex: 1; font-size: 13px; padding: 7px 8px; border: 2px solid #D8C0A8; border-radius: 8px; background: #FFF8F4; color: #1A1A1A; font-weight: 500; }
.madd-row button { padding: 7px 14px; font-size: 13px; font-weight: 700; background: #E8832A; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.mclose-btn { margin-top: 10px; width: 100%; padding: 10px; border: 2px solid #D8C0A8; border-radius: 10px; background: transparent; cursor: pointer; font-size: 14px; color: #806040; font-weight: 600; }
.mclose-btn:hover { background: #FFF0E0; }
.minput { width: 100%; padding: 9px 12px; border: 2px solid #D8C0A8; border-radius: 9px; font-size: 14px; font-family: inherit; background: #FFF8F4; margin-bottom: 8px; color: #1A1A1A; font-weight: 500; }
.minput:focus { outline: none; border-color: #E8832A; }
.mselect { width: 100%; padding: 9px 12px; border: 2px solid #D8C0A8; border-radius: 9px; font-size: 14px; font-family: inherit; background: #FFF8F4; margin-bottom: 8px; color: #1A1A1A; font-weight: 500; }
.mselect:focus { outline: none; border-color: #E8832A; }
.mgrid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.mgrid3 input { padding: 9px 6px; border: 2px solid #D8C0A8; border-radius: 9px; font-size: 13px; font-family: inherit; text-align: center; background: #FFF8F4; color: #1A1A1A; font-weight: 600; }
.mgrid3 input:focus { outline: none; border-color: #E8832A; }
.mlabel { font-size: 11px; font-weight: 700; color: #A08060; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
 
/* ローディング・トースト */
.loading { text-align: center; padding: 40px; color: #A08060; font-size: 14px; font-weight: 500; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: #fff; padding: 10px 22px; border-radius: 22px; font-size: 14px; font-weight: 600; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
 
/* ボトムナビ */
.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid #E0C0A0; padding: 6px 0 max(6px, env(safe-area-inset-bottom)); z-index: 100; box-shadow: 0 -3px 16px rgba(180,100,0,0.12); }
.bottom-nav-inner { display: flex; justify-content: space-around; }
.bnav-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 8px; background: none; border: none; cursor: pointer; color: #B09070; font-size: 10px; font-weight: 600; font-family: inherit; }
.bnav-btn .bicon { font-size: 20px; line-height: 1; }
.bnav-btn.active { color: #E8832A; }
 
.paw-divider { text-align: center; color: #E8A060; font-size: 20px; margin: 16px 0; letter-spacing: 8px; }
.hint { font-size: 12px; color: #A08060; margin-top: 8px; font-weight: 500; text-align: center; }
 
@media (max-width: 600px) {
  .tab-bar { display: none; }
  .bottom-nav { display: block; }
  .content { padding: 12px 12px 82px; }
  .app-header { padding: 10px 14px 10px; }
  .app-header .header-top { margin-bottom: 0; }
  .dog-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .kennel-layout { grid-template-columns: 1fr 26px 1fr; gap: 3px; }
  .cage { min-height: 50px; padding: 5px 6px; }
  .cage-id { font-size: 8px; }
  .dog-tag { font-size: 10px; }
  .aisle { font-size: 9px; }
  .wage-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
  .cal-grid { gap: 2px; }
  .cal-cell { min-height: 55px; padding: 3px; }
  .cal-shift-tag { font-size: 8px; }
  .staff-shift-row label { width: 46px; font-size: 12px; }

<script>
// ================= Supabase =================
const SUPA_URL = 'https://akrtgasyenuptcoezwhs.supabase.co';
const SUPA_KEY = 'sb_publishable_VbnT0A4f8QdDLkBXYC7sOw_k2cUVXTh';
 
async function supaFetch(path, method='GET', body=null) {
  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json',
  };
  if (method==='POST') headers['Prefer'] = 'return=representation';
  if (method==='PATCH') headers['Prefer'] = 'return=representation';
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
 
// ================= 状態 =================
const EMOJIS = ['🐩','🐶','🐕','🦮','🐾','🐕‍🦺'];
const BG_COLORS = ['#FFE0EC','#FFF0D0','#D8EEFF','#E0FFE8','#F0E0FF','#FFE8D0'];
 
// スタッフカラー (3人分 + 予備)

  { bg: '#C8EFC8', text: '#1A5A1A' },
  { bg: '#C8DEFF', text: '#112288' },
  { bg: '#FFE0C0', text: '#804020' },
  { bg: '#F5D0DC', text: '#882244' },

];

  const t = document.getElementById('toast');

  dogs = await supaFetch('dogs?order=id.asc');
  renderDogs();
}
 
function dogLocLabel(loc) {
  if (loc==='birth') return 'お産部屋';
  if (loc==='A') return '犬舎A';
  if (loc==='B') return '犬舎B';
  return '未配置';
}
 
// ビュー切り替え

  dogViewMode = mode;
  document.getElementById('btn-grid-view').classList.toggle('active', mode==='grid');
  document.getElementById('btn-list-view').classList.toggle('active', mode==='list');
  document.getElementById('dog-grid').style.display = mode==='grid' ? '' : 'none';
  document.getElementById('dog-list').style.display = mode==='list' ? '' : 'none';
  renderDogs();
}
 
function renderDogs() {
  if (dogViewMode === 'grid') {
    renderDogsGrid();
  } else {
    renderDogsList();
  }
}
 
function renderDogsGrid() {
  const grid = document.getElementById('dog-grid');
  if (!dogs.length) { grid.innerHTML = '<p style="color:#A08060;font-size:14px;font-weight:500;">犬が登録されていません</p>'; return; }
  grid.innerHTML = dogs.map((d,i) => {
    const emoji = d.emoji || EMOJIS[i % EMOJIS.length];
    const bg    = d.bg    || BG_COLORS[i % BG_COLORS.length];
    return `<div class="dog-card" onclick="openDetail(${d.id})">
      <button class="dog-del-btn" onclick="event.stopPropagation();deleteDog(${d.id})">&#10005;</button>
      <div class="dog-avatar" style="background:${bg};">${emoji}</div>
      <h3>${d.name}</h3>

  }).join('');
}
 
function renderDogsList() {
  const list = document.getElementById('dog-list');
  if (!dogs.length) { list.innerHTML = '<p style="color:#A08060;font-size:14px;font-weight:500;">犬が登録されていません</p>'; return; }

    return `<div class="dog-list-row" onclick="openDetail(${d.id})">
      <div class="dog-list-avatar" style="background:${bg};">${emoji}</div>

function openDetail(id) {
  editingDogId = id;

  const name     = document.getElementById('edit-name').value.trim();
  const breed    = document.getElementById('edit-breed').value.trim();

  await supaFetch(`cage_assignments?dog_id=eq.${id}`, 'DELETE');

  renderKennel(currentKennel);

  if (addingNew) return;
  addingNew = true;
  const name     = document.getElementById('new-name').value.trim();

}

      <button onclick="event.stopPropagation();openBirthInfoModal('${key}','${dName}')" style="margin-top:5px;font-size:11px;color:#E8832A;background:#FFF5EE;border:1.5px solid #E8A060;border-radius:7px;padding:3px 8px;cursor:pointer;width:100%;font-weight:600;">出産情報を編集</button>`;
    } else {
      birthHTML = `<button onclick="event.stopPropagation();openBirthInfoModal('${key}','${dName}')" style="margin-top:5px;font-size:11px;color:#A08060;background:#F8F0E8;border:1.5px dashed #C8A880;border-radius:7px;padding:3px 8px;cursor:pointer;width:100%;font-weight:600;">🍼 出産情報を入力</button>`;
    }
  }
  return `<div class="cage ${cls}" onclick="openCageModal('${kennel}','${key}',${max})">
    <div class="cage-id">${label}</div>
    <div class="cage-dogs">${tagsHTML}</div>
    ${birthHTML}
  </div>`;
}
 
function renderKennel(kennel) {
  const el = document.getElementById('kv-'+kennel);
  const isBirth = kennel==='birth';
  const rows = 10;
  const max  = isBirth ? 1 : 2;
 
  let used=0, total=0, count=0;
  for (let r=1; r<=rows; r++) {
    if (isBirth) {
      ['L','R'].forEach(s => {
        total++;
        const n = getCageDogs(kennel,`${s}${r}`).length;
        if (n>0) { used++; count+=n; }
      });
    } else {
      ['L','R'].forEach(s => ['上','下'].forEach(lv => {
        total++;
        const n = getCageDogs(kennel,`${s}${r}${lv}`).length;
        if (n>0) { used++; count+=n; }
      }));
    }
  }
  const capacity = isBirth ? total : total*2;
 
  let leftHTML='', rightHTML='';
  for (let r=rows; r>=1; r--) {
    if (isBirth) {
      leftHTML  += cageHTML(kennel,`L${r}`,`左 ${r}番`,max) + '<div style="height:5px;"></div>';
      rightHTML += cageHTML(kennel,`R${r}`,`右 ${r}番`,max) + '<div style="height:5px;"></div>';
    } else {
      leftHTML  += `<div class="row-label">${r}列</div>`;
      leftHTML  += cageHTML(kennel,`L${r}上`,`左${r} 上段`,max);
      leftHTML  += cageHTML(kennel,`L${r}下`,`左${r} 下段`,max);
      leftHTML  += '<div style="height:5px;"></div>';
      rightHTML += `<div class="row-label">${r}列</div>`;
      rightHTML += cageHTML(kennel,`R${r}上`,`右${r} 上段`,max);
      rightHTML += cageHTML(kennel,`R${r}下`,`右${r} 下段`,max);
      rightHTML += '<div style="height:5px;"></div>';
    }
  }
 
  el.innerHTML = `
    <div class="stats-bar">
      <div class="stat"><strong>${count}</strong>頭在室</div>
      <div class="stat"><strong>${used}/${total}</strong>ケージ使用中</div>
      <div class="stat"><strong>${capacity-count}</strong>頭収容可能</div>
    </div>
    <div class="kennel-layout">
      <div class="cage-col">${leftHTML}</div>
      <div class="aisle">通　路</div>
      <div class="cage-col">${rightHTML}</div>
    </div>`;
}
 
function openCageModal(kennel, key, max) {
  currentKennel=kennel; currentCageKey=key; currentCageMax=max;
  const cDogs = getCageDogs(kennel, key);
  const isFull = cDogs.length>=max;
  document.getElementById('modal-cage-title').textContent = `ケージ ${key}`;
  const body = cDogs.length===0
    ? '<p style="font-size:14px;color:#A08060;padding:8px 0;font-weight:500;">空きケージです</p>'
    : cDogs.map(d=>`<div class="modal-dog-row">
        <span class="dog-tag ${d.gender}" style="font-size:13px;">${d.emoji||'🐾'} ${d.name}</span>
        <button class="mremove" onclick="removeDogFromCage(${d.id})">移動・解除</button>
      </div>`).join('');
  document.getElementById('modal-cage-body').innerHTML = body;
  const available = dogs.filter(d=>!cDogs.find(cd=>cd.id===d.id));
  const sel = document.getElementById('cage-dog-select');
  sel.disabled = isFull;
  sel.innerHTML = isFull ? '<option>満員です</option>'
    : available.length===0 ? '<option>割り当て可能な犬がいません</option>'
    : available.map(d=>`<option value="${d.id}">${d.emoji||'🐾'} ${d.name}（${d.gender==='female'?'メス':'オス'}）</option>`).join('');
  openModal('cage-overlay');
}
 
async function removeDogFromCage(dogId) {
  await supaFetch(`cage_assignments?kennel=eq.${currentKennel}&cage_key=eq.${currentCageKey}&dog_id=eq.${dogId}`,'DELETE');
  await supaFetch(`dogs?id=eq.${dogId}`,'PATCH',{location:null});
  showToast('解除しました');
  await loadCageAssignments(); await loadDogs();
  renderKennel(currentKennel);
  openCageModal(currentKennel, currentCageKey, currentCageMax);
}
 
async function assignDog() {
  const sel = document.getElementById('cage-dog-select');
  const dogId = parseInt(sel.value);
  if (!dogId||isNaN(dogId)) return;
  if (getCageDogs(currentKennel,currentCageKey).length>=currentCageMax) return;
  await supaFetch(`cage_assignments?dog_id=eq.${dogId}`,'DELETE');
  await supaFetch('cage_assignments','POST',{kennel:currentKennel, cage_key:currentCageKey, dog_id:dogId});
  await supaFetch(`dogs?id=eq.${dogId}`,'PATCH',{location:currentKennel});
  showToast('割り当てました');
  await loadCageAssignments(); await loadDogs();
  renderKennel(currentKennel);
  openCageModal(currentKennel, currentCageKey, currentCageMax);
}
 
function openBirthInfoModal(key, dogName) {
  currentBirthCageKey = key;
  document.getElementById('bi-title').textContent = `🍼 ${dogName} の出産情報`;
  const info = birthInfoMap[key]||{};
  document.getElementById('bi-due').value    = info.due_date    ||'';
  document.getElementById('bi-birth').value  = info.birth_date  ||'';
  document.getElementById('bi-male').value   = info.male_count  ||'';
  document.getElementById('bi-female').value = info.female_count||'';
  document.getElementById('bi-dead').value   = info.dead_count  ||'';
  openModal('birth-info-overlay');
}
 
async function saveBirthInfo() {
  const data = {
    cage_key:     currentBirthCageKey,
    due_date:     document.getElementById('bi-due').value   ||null,
    birth_date:   document.getElementById('bi-birth').value ||null,
    male_count:   parseInt(document.getElementById('bi-male').value)  ||0,
    female_count: parseInt(document.getElementById('bi-female').value)||0,
    dead_count:   parseInt(document.getElementById('bi-dead').value)  ||0,
    updated_at:   new Date().toISOString(),
  };
  if (birthInfoMap[currentBirthCageKey]) {
    await supaFetch(`birth_info?cage_key=eq.${currentBirthCageKey}`,'PATCH',data);
  } else {
    await supaFetch('birth_info','POST',data);
  }
  showToast('保存しました');
  closeModal('birth-info-overlay');
  await loadBirthInfo();
  renderKennel('birth');
}
 
function switchKennel(k, el) {
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.kview').forEach(v=>v.classList.remove('active'));
  document.getElementById('kv-'+k).classList.add('active');
  currentKennel=k; renderKennel(k);
}
 
// ================= 交配管理 =================
async function loadBreedRecords() {
  breedRecords = await supaFetch('breed_records?order=id.desc');
  renderBreed();
}
const STATUS_LABEL = {pregnant:'妊娠中', planned:'交配予定', done:'完了'};
const STATUS_CLS   = {pregnant:'pregnant', planned:'planned', done:'done'};
 
function renderBreed() {
  const el = document.getElementById('breed-list');
  if (!breedRecords.length) { el.innerHTML='<p style="color:#A08060;font-size:14px;font-weight:500;text-align:center;padding:20px 0;">交配記録がありません</p>'; return; }
  el.innerHTML = breedRecords.map(r => {
    const fm = dogs.find(d=>d.id===r.female_id);
    const ml = dogs.find(d=>d.id===r.male_id);
    const hasResult = r.status==='done' && (r.male_count!=null||r.female_count!=null);
    return `<div class="breed-card">
      <button class="breed-del" onclick="deleteBreed(${r.id})">&#10005;</button>
      <div class="breed-card-top">
        <div class="breed-pair">&#9792; ${fm?fm.name:'?'} &times; &#9794; ${ml?ml.name:'?'}</div>
        <span class="bstatus ${STATUS_CLS[r.status]||'planned'}">${STATUS_LABEL[r.status]||r.status}</span>
      </div>
      <div class="breed-dates">
        <div>交配日<span>${r.mating_date||'?'}</span></div>
        <div>出産予定<span>${r.due_date||'?'}</span></div>
        <div>出産日<span>${r.birth_date||'?'}</span></div>
        <div></div>
      </div>
      ${hasResult?`<div class="birth-result">
        <div><div class="bnum">&#9794; ${r.male_count||0}</div><div class="blabel">オス</div></div>
        <div><div class="bnum">&#9792; ${r.female_count||0}</div><div class="blabel">メス</div></div>
        <div><div class="bnum">${r.dead_count||0}</div><div class="blabel">死産</div></div>
        <div><div class="bnum">${(r.male_count||0)+(r.female_count||0)}</div><div class="blabel">合計</div></div>
      </div>`:''}
    </div>`;
  }).join('');
}
 
function openBreedModal() {
  const females = dogs.filter(d=>d.gender==='female');
  const males   = dogs.filter(d=>d.gender==='male');
  document.getElementById('b-female').innerHTML = females.length
    ? females.map(d=>`<option value="${d.id}">&#9792; ${d.name}（${d.breed}）</option>`).join('')
    : '<option>メスの犬がいません</option>';
  document.getElementById('b-male').innerHTML = males.length
    ? males.map(d=>`<option value="${d.id}">&#9794; ${d.name}（${d.breed}）</option>`).join('')
    : '<option>オスの犬がいません</option>';
  ['b-mating-date','b-due-date','b-birth-date','b-male-count','b-female-count','b-dead-count'].forEach(id=>document.getElementById(id).value='');
  openModal('breed-overlay');
}
 
async function saveBreed() {
  const data = {
    female_id:    parseInt(document.getElementById('b-female').value)||null,
    male_id:      parseInt(document.getElementById('b-male').value)||null,
    status:       document.getElementById('b-status').value,
    mating_date:  document.getElementById('b-mating-date').value||null,
    due_date:     document.getElementById('b-due-date').value||null,
    birth_date:   document.getElementById('b-birth-date').value||null,
    male_count:   parseInt(document.getElementById('b-male-count').value)||null,
    female_count: parseInt(document.getElementById('b-female-count').value)||null,
    dead_count:   parseInt(document.getElementById('b-dead-count').value)||null,
  };
  await supaFetch('breed_records','POST',data);
  showToast('追加しました');
  closeModal('breed-overlay');
  await loadBreedRecords();
}
 
async function deleteBreed(id) {
  if (!confirm('この交配記録を削除しますか？')) return;
  await supaFetch(`breed_records?id=eq.${id}`,'DELETE');
  showToast('削除しました');
  await loadBreedRecords();
}
 
// ================= スタッフ管理 =================
async function loadStaff() {
  staffList = await supaFetch('staff?order=id.asc');
}
 
function renderStaffList() {
  const el = document.getElementById('staff-list-view');
  if (!staffList.length) { el.innerHTML='<div class="loading">スタッフが登録されていません</div>'; return; }
  el.innerHTML = staffList.map((s,i) => {
    const color = getStaffColor(i);
    return `
    <div class="staff-card">
      <div class="staff-icon" style="background:${color.bg};color:${color.text};">&#128101;</div>
      <div class="staff-info">
        <div class="sname">${s.name}</div>
        <div class="swage">時給 &yen;${s.hourly_wage.toLocaleString()}</div>
      </div>
      <button class="staff-edit-btn" onclick="openStaffEdit(${s.id})">編集</button>
    </div>
  `}).join('');
}
 
function openStaffEdit(id) {
  const s = staffList.find(x=>x.id===id);
  if (!s) return;
  document.getElementById('edit-staff-id').value   = s.id;
  document.getElementById('edit-staff-name').value = s.name;
  document.getElementById('edit-staff-wage').value = s.hourly_wage;
  openModal('staff-edit-overlay');
}
 
async function saveStaff() {
  const id   = parseInt(document.getElementById('edit-staff-id').value);
  const name = document.getElementById('edit-staff-name').value.trim();
  const wage = parseInt(document.getElementById('edit-staff-wage').value)||0;
  if (!name) { showToast('名前を入力してください'); return; }
  await supaFetch(`staff?id=eq.${id}`,'PATCH',{name, hourly_wage:wage});
  showToast('保存しました');
  closeModal('staff-edit-overlay');
  await loadStaff();
  renderStaffList();
  renderWage();
}
 
// ================= シフト =================
async function loadShifts() {
  const y=currentYear, m=currentMonth+1;
  const from = `${y}-${String(m).padStart(2,'0')}-01`;
  const lastDay = new Date(y,m,0).getDate();
  const to   = `${y}-${String(m).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const rows = await supaFetch(`shifts?work_date=gte.${from}&work_date=lte.${to}&select=*`);
  shiftsMap = {};
  rows.forEach(r=>{ shiftsMap[`${r.staff_id}_${r.work_date}`]=r; });
}
 
function renderShiftLegend() {
  const el = document.getElementById('shift-legend');
  el.innerHTML = staffList.map((s,i) => {
    const color = getStaffColor(i);
    const shortName = s.name.split(' ').pop() || s.name;
    return `<div class="shift-legend-item">
      <div class="shift-legend-dot" style="background:${color.bg};border:1.5px solid ${color.text};"></div>
      ${shortName}
    </div>`;
  }).join('');
}
 
async function renderShiftCal() {
  await loadShifts();
  document.getElementById('month-label').textContent = `${currentYear}年${currentMonth+1}月`;
  renderShiftLegend();
 
  const daysInMonth = new Date(currentYear,currentMonth+1,0).getDate();
  const firstDow    = new Date(currentYear,currentMonth,1).getDay();
  const DOWS = ['日','月','火','水','木','金','土'];
  const today = new Date();
 
  let html = DOWS.map((d,i)=>`<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  for (let i=0;i<firstDow;i++) html += '<div class="cal-cell empty-cell"></div>';
 
  for (let day=1; day<=daysInMonth; day++) {
    const dow = new Date(currentYear,currentMonth,day).getDay();
    const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===day;
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dateCls = dow===0?'sun':dow===6?'sat':'';
    let shiftsHTML = '';
    staffList.forEach((s,idx)=>{
      const sh = shiftsMap[`${s.id}_${dateStr}`];
      if (sh&&sh.start_time) {
        const color = getStaffColor(idx);
        const shortName = s.name.split(' ').pop() || s.name;
        shiftsHTML += `<div class="cal-shift-tag" style="background:${color.bg};color:${color.text};">${shortName} ${sh.start_time.slice(0,5)}-${sh.end_time.slice(0,5)}</div>`;
      }
    });
    html += `<div class="cal-cell ${isToday?'today':''}" onclick="openShiftModal('${dateStr}',${day})">
      <div class="cal-date ${dateCls}">${day}</div>
      <div class="cal-shifts">${shiftsHTML}</div>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}
 
function openShiftModal(dateStr, day) {
  editingShiftDate = dateStr;
  const dow = new Date(currentYear,currentMonth,day).getDay();
  const DOWS = ['日','月','火','水','木','金','土'];
  document.getElementById('shift-modal-title').textContent = `${currentMonth+1}月${day}日（${DOWS[dow]}）`;
  let html = '';
  staffList.forEach((s,idx)=>{
    const sh = shiftsMap[`${s.id}_${dateStr}`];
    const start = sh?.start_time?.slice(0,5)||'';
    const end   = sh?.end_time?.slice(0,5)  ||'';
    const shortName = s.name.split(' ').pop() || s.name;
    const color = getStaffColor(idx);
    html += `<div class="staff-shift-row">
      <label><span class="shift-dot" style="background:${color.bg};border:1.5px solid ${color.text};"></span>${shortName}</label>
      <input type="time" id="shift-start-${s.id}" value="${start}">
      <span class="time-sep">〜</span>
      <input type="time" id="shift-end-${s.id}" value="${end}">
    </div>`;
  });
  document.getElementById('staff-shift-list').innerHTML = html;
  openModal('shift-overlay');
}
 
async function saveShifts() {
  await Promise.all(staffList.map(async s=>{
    const start = document.getElementById(`shift-start-${s.id}`).value;
    const end   = document.getElementById(`shift-end-${s.id}`).value;
    const key   = `${s.id}_${editingShiftDate}`;
    const ex    = shiftsMap[key];
    if (start&&end) {
      const data = {staff_id:s.id, work_date:editingShiftDate, start_time:start, end_time:end};
      if (ex) await supaFetch(`shifts?id=eq.${ex.id}`,'PATCH',data);
      else    await supaFetch('shifts','POST',data);
    } else if (ex) {
      await supaFetch(`shifts?id=eq.${ex.id}`,'DELETE');
    }
  }));
  showToast('保存しました');
  closeModal('shift-overlay');
  await renderShiftCal();
}
 
async function changeMonth(delta) {
  currentMonth+=delta;
  if (currentMonth>11) { currentMonth=0; currentYear++; }
  if (currentMonth<0)  { currentMonth=11; currentYear--; }
  await renderShiftCal();
  renderWageCards();
}
 
// ================= 給与 =================
function renderWage() {
  document.getElementById('hourly-list').innerHTML = staffList.map((s,i)=> {
    const color = getStaffColor(i);
    return `<div class="hourly-row">
      <span style="display:flex;align-items:center;gap:7px;">
        <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${color.bg};border:1.5px solid ${color.text};"></span>
        ${s.name}
      </span>
      <div style="display:flex;align-items:center;gap:5px;">
        <input type="number" value="${s.hourly_wage}" onchange="updateWage(${s.id},this.value)">
        <span style="font-size:13px;color:#A08060;font-weight:600;">円/時</span>
      </div>
    </div>`;
  }).join('');
  renderWageCards();
}
 
async function updateWage(staffId, val) {
  const wage = parseInt(val)||0;
  await supaFetch(`staff?id=eq.${staffId}`,'PATCH',{hourly_wage:wage});
  const s = staffList.find(x=>x.id===staffId);
  if (s) s.hourly_wage=wage;
  renderWageCards();
}
 
function renderWageCards() {
  document.getElementById('wage-cards').innerHTML = staffList.map((s,i)=>{
    let totalH=0, workDays=0;
    Object.keys(shiftsMap).forEach(k=>{
      if (k.startsWith(`${s.id}_`)) {
        const sh=shiftsMap[k];
        if (sh.start_time&&sh.end_time) {
          const [h1,m1]=sh.start_time.split(':').map(Number);
          const [h2,m2]=sh.end_time.split(':').map(Number);
          totalH+=(h2*60+m2-h1*60-m1)/60;
          workDays++;
        }
      }
    });
    const total=Math.round(totalH*s.hourly_wage);
    const color = getStaffColor(i);
    return `<div class="wage-card" style="border-color:${color.bg};">
      <div class="wname" style="display:flex;align-items:center;gap:6px;">
        <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${color.bg};border:1.5px solid ${color.text};"></span>
        ${s.name}
      </div>
      <div class="whours">${workDays}日 / ${totalH.toFixed(1)}h</div>
      <div class="wamt"><span class="wyen">&yen;</span>${total.toLocaleString()}</div>
    </div>`;
  }).join('');
}
 
// ================= タブ切替 =================
function switchMain(tab, el) {
  document.querySelectorAll('.tab, .bnav-btn').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`[data-tab="${tab}"]`).forEach(t=>t.classList.add('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if (tab==='shift')  renderShiftCal();
  if (tab==='wage')   { loadShifts().then(()=>renderWage()); }
  if (tab==='breed')  renderBreed();
  if (tab==='kennel') renderKennel(currentKennel);
  if (tab==='staff')  renderStaffList();
}
 
// ================= 初期化 =================
async function init() {
  try {
    await Promise.all([loadDogs(), loadStaff(), loadCageAssignments(), loadBirthInfo(), loadBreedRecords()]);
    renderKennel('A');
    await loadShifts();
    renderWage();
  } catch(e) {
    console.error(e);
    showToast('接続エラー。再読み込みしてください');
  }
}
init();
</script>
